<style>
  :root {
    --primary: #166534;
    --primary-dark: #0e3f1f;
    --primary-soft: rgba(22,101,52,.08);
    --accent: #65A30D;
    --accent-dark: #4d7c0f;
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f3f5f0;
    --surface-3: #e9ece2;
    --text: #1c1f17;
    --muted: #6b7264;
    --border: rgba(0,0,0,.07);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.03);
    --gap: 20px;
    --row-py: 14px;
    --card-py: 20px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: "IBM Plex Sans Thai", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
    font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  button, input, textarea, select { font-family: inherit; color: inherit; }

  .tu-muted { color: var(--muted); }
  .tu-link { background: transparent; border: 0; color: var(--primary); cursor: pointer;
    font-size: 12.5px; font-weight: 500; font-family: inherit; padding: 0;
    text-decoration: none; transition: color .15s; }
  .tu-link:hover { color: var(--primary-dark); text-decoration: underline; text-underline-offset: 3px; }

  /* ── App shell ─────────────────────────────────────────── */
  .tu-shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
  .tu-sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
    overflow-y: auto; overflow-x: hidden;
  }
  .tu-main { display: flex; flex-direction: column; min-width: 0; }
  .tu-topbar {
    position: sticky; top: 0; z-index: 10; background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px; display: flex; align-items: center; gap: 16px;
    backdrop-filter: blur(8px);
  }
  .tu-content { padding: 28px; flex: 1; min-width: 0;
    transition: opacity .12s ease-out; opacity: 1; }
  .tu-content-out { opacity: 0; }
  .tu-page { display: flex; flex-direction: column; gap: 20px; }

  .tu-nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 10px;
    border: 0; background: transparent; cursor: pointer; font-family: inherit;
    color: var(--text); text-align: left; width: 100%;
    transition: background .15s, color .15s;
  }
  .tu-nav-item:hover { background: var(--surface-2); }
  .tu-nav-active { background: var(--primary-soft) !important; }
  .tu-nav-active span { color: var(--text); }

  .tu-icon-btn {
    width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); position: relative; transition: all .15s;
  }
  .tu-icon-btn:hover { background: var(--surface-2); color: var(--text); }

  /* ── Cards ─────────────────────────────────────────── */
  .tu-card {
    background: var(--surface); border-radius: 14px; border: 1px solid var(--border);
    box-shadow: var(--shadow-sm); transition: box-shadow .2s, transform .2s;
  }
  .tu-card-hover:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

  /* ── Lists ─────────────────────────────────────────── */
  .tu-list-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 4px; border-bottom: 1px solid var(--border);
  }
  .tu-list-row:last-child { border-bottom: 0; }

  /* ── Table ─────────────────────────────────────────── */
  .tu-table { width: 100%; border-collapse: collapse; }
  .tu-table thead th {
    text-align: left; font-weight: 500; font-size: 11.5px; letter-spacing: .04em;
    text-transform: uppercase; color: var(--muted);
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .tu-table tbody td {
    padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13.5px;
    vertical-align: middle;
  }
  .tu-table tbody tr:last-child td { border-bottom: 0; }
  .tu-row-hover { cursor: pointer; transition: background .12s; }
  .tu-row-hover:hover { background: var(--surface-2); }
  .tu-table-inline thead th { background: transparent; border-bottom: 1px solid var(--border); }
  .tu-table-inline tbody td { padding: 10px 0; }

  /* ── Forms ─────────────────────────────────────────── */
  .tu-select {
    appearance: none; height: 36px; padding: 0 32px 0 12px; font-size: 13;
    border: 1px solid var(--border); border-radius: 10px; background: var(--surface);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%236b7264' d='M0 0h10L5 6z'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
    color: var(--text); cursor: pointer; font-family: inherit;
  }

  /* ── Room tiles ──────────────────────────────────────── */
  .tu-room-tile {
    border-radius: 10px; padding: 14px 6px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .15s cubic-bezier(.3,.7,.4,1.4), box-shadow .15s;
    font-family: inherit; min-height: 64px;
  }
  .tu-room-tile:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .tu-room-tile:active { transform: translateY(0); }

  /* ── Bars ─────────────────────────────────────────── */
  @keyframes tuBarRise {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
  .tu-bar { transform-origin: bottom; }

  /* ── Page transitions ────────────────────────────── */
  @keyframes tuFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes tuModalIn { from { opacity: 0; transform: translateY(8px) scale(.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  /* Page fade: subtle entry. Default state visible; on .tu-fade-in (after rAF) animate. */
  .tu-page-fade { opacity: 1; transition: opacity .25s ease, transform .25s ease; }
  .tu-page-fade-init { opacity: 0; transform: translateY(8px); }

  @keyframes tuCheckPop { 0% { transform: scale(.4); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); } }
  @keyframes tuProgress { from { width: 0; } to { width: 100%; } }

  /* ── Promo rows ────────────────────────────────────── */
  .tu-promo-row {
    display: flex; align-items: center; gap: 14px; padding: 14px;
    border-radius: 12px; background: var(--surface-2);
    transition: background .15s;
  }
  .tu-promo-row:hover { background: var(--surface-3); }

  /* ── View switcher (floating) ───────────────────────── */
  .tu-viewswitch {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 50; padding: 6px 8px; background: rgba(20, 32, 22, .92);
    backdrop-filter: blur(12px);
    border-radius: 999px; display: flex; align-items: center; gap: 4px;
    box-shadow: 0 6px 24px rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.08);
  }
  .tu-vs-btn {
    appearance: none; padding: 8px 14px; border: 0; border-radius: 999px;
    background: transparent; color: rgba(255,255,255,.65); cursor: pointer;
    font-family: inherit; font-size: 12.5px; font-weight: 500; transition: all .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tu-vs-btn:hover { color: #fff; }
  .tu-vs-active { background: rgba(255,255,255,.16); color: #fff; }

  /* ── Auth screen ─────────────────────────────────── */
  .tu-auth { display: grid; grid-template-columns: 1.05fr 1fr; min-height: 100vh; }
  .tu-auth-brand {
    padding: 32px 48px; display: flex; flex-direction: column;
    background: linear-gradient(160deg, var(--primary-dark), var(--primary) 55%, var(--accent-dark));
    position: relative; overflow: hidden;
  }
  .tu-auth-form { display: flex; align-items: center; justify-content: center; padding: 32px; background: var(--surface); }
  @media (max-width: 800px) {
    .tu-auth { grid-template-columns: 1fr; }
    .tu-auth-brand { display: none; }
  }

  /* ── Customer portal ─────────────────────────────── */
  .tu-portal { min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; }

  /* ── Responsive ──────────────────────────────────── */
  @media (max-width: 920px) {
    .tu-shell { grid-template-columns: 72px 1fr; }
    .tu-sidebar nav button span:last-child { display: none; }
    .tu-sidebar nav button { justify-content: center; }
    .tu-sidebar > div:first-child { justify-content: center; padding: 22px 8px; }
    .tu-sidebar > div:first-child > div { display: none; }
    .tu-sidebar > div:last-child { display: none; }
    .tu-sidebar > nav > div:first-child { display: none; }
  }
  @media (max-width: 900px) {
    .tu-content { padding: 16px; }
    .tu-page > div[style*="grid-template-columns: repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
  }

  /* Hide chrome when printing */
  @media print {
    .tu-sidebar, .tu-topbar, .tu-viewswitch, .twk-panel { display: none !important; }
  }
</style>

(function(){
const today = new Date('2026-05-26');

// Generate 36 rooms across 4 floors, 9 rooms per floor
// Floors 1-3 monthly, floor 4 mixed monthly/daily
const ROOMS = (() => {
  const statuses = {
    monthly: ['vacant', 'booked', 'occupied', 'notice', 'maintenance'],
    daily: ['vacant', 'booked', 'occupied', 'cleaning'],
  };
  // Pre-baked layout so dashboard numbers look realistic and stable
  // 4 floors × 9 rooms = 36 rooms (101–109, 201–209, 301–309, 401–409)
  const layout = [
    // Floor 1
    'occupied','occupied','vacant','occupied','occupied','booked','occupied','vacant','occupied',
    // Floor 2
    'occupied','occupied','occupied','notice','occupied','occupied','vacant','occupied','occupied',
    // Floor 3
    'occupied','vacant','occupied','occupied','occupied','occupied','booked','occupied','occupied',
    // Floor 4 (daily)
    'occupied','vacant','booked','occupied','cleaning','vacant','occupied','occupied','vacant',
  ];
  const rooms = [];
  const firstNames = ['สมชาย','สมหญิง','ปริญญา','ณัฐวุฒิ','พิมพ์ชนก','ธนพร','กิตติพงษ์','อรอนงค์','วรพล','ชนาภัทร','เมธี','สุพรรษา','ปรีชา','ภัทรดา','กฤษดา','ลลิตา','ธีระ','นันท์นภัส','อาทิตย์','ปัทมา'];
  const lastNames = ['ใจดี','รักดี','พงศ์ศักดิ์','วงศ์สุข','ศรีสุข','ทองคำ','เจริญพร','สายทอง','ศรีวิชัย','พรหมมา'];
  let nameIdx = 0;
  for (let f = 1; f <= 4; f++) {
    for (let r = 1; r <= 9; r++) {
      const i = (f - 1) * 9 + (r - 1);
      const type = f === 4 ? 'daily' : 'monthly';
      const status = layout[i];
      const id = `${f}${String(r).padStart(2, '0')}`;
      const occupied = status === 'occupied' || status === 'notice';
      const tenant = occupied
        ? `คุณ${firstNames[nameIdx % firstNames.length]} ${lastNames[(nameIdx++) % lastNames.length]}`
        : null;
      const checkIn = occupied
        ? new Date(today.getFullYear(), today.getMonth() - Math.floor(Math.random()*6) - 1, Math.floor(Math.random()*28)+1)
        : null;
      rooms.push({
        id, floor: f, number: r, type, status, tenant,
        checkIn: checkIn ? checkIn.toISOString().slice(0,10) : null,
        rent: type === 'monthly' ? 4000 : 500,
        size: type === 'monthly' ? 24 : 18,
        bed: type === 'monthly' ? 'เตียงคู่' : 'เตียงเดี่ยว',
      });
    }
  }
  return rooms;
})();

const TENANTS = ROOMS.filter(r => r.tenant).map((r, i) => ({

}));

// Invoices for monthly tenants
const INVOICES = (() => {
  const out = [];
  const monthlyTenants = TENANTS.filter(t => t.type === 'monthly');
  monthlyTenants.forEach((t, i) => {
    // Current month invoice
    const water = 4 + (i % 6); // units
    const elec = 80 + (i * 13 % 120); // units
    const items = [
      { label: 'ค่าเช่าห้อง (พ.ค. 2569)', qty: 1, unit: 'เดือน', price: 4000, amount: 4000 },
      { label: 'ค่าน้ำประปา', qty: water, unit: 'หน่วย', price: 25, amount: water * 25 },
      { label: 'ค่าไฟฟ้า', qty: elec, unit: 'หน่วย', price: 10, amount: elec * 10 },
    ];
    if (i % 5 === 0) items.push({ label: 'ค่าบริการอินเตอร์เน็ต', qty: 1, unit: 'เดือน', price: 200, amount: 200 });
    const total = items.reduce((s, it) => s + it.amount, 0);
    const statuses = ['paid','paid','pending','overdue','paid','pending','paid'];
    const st = statuses[i % statuses.length];
    out.push({
      id: `INV-2026-05-${String(i+1).padStart(3,'0')}`,
      tenantId: t.id, room: t.room, tenantName: t.name,
      type: 'monthly',
      period: 'พฤษภาคม 2569',
      issueDate: '2026-05-25',
      dueDate: '2026-06-05',
      items, total,
      status: st,
      paidAt: st === 'paid' ? '2026-05-' + String(20 + (i % 7)) : null,
      paymentMethod: st === 'paid' ? ['โอนผ่าน QR PromptPay','โอนธนาคาร','เงินสด'][i % 3] : null,
    });
  });
  // Daily invoices (a few stays)
  const dailyTenants = TENANTS.filter(t => t.type === 'daily').slice(0, 4);
  dailyTenants.forEach((t, i) => {
    const nights = 2 + (i % 5);
    const items = [
      { label: `ค่าเช่าห้องรายวัน (${nights} คืน)`, qty: nights, unit: 'คืน', price: 500, amount: nights * 500 },
      { label: 'ค่ามัดจำกุญแจ', qty: 1, unit: 'ครั้ง', price: 200, amount: 200 },
    ];
    const total = items.reduce((s, it) => s + it.amount, 0);
    out.push({
      id: `INV-2026-05-D${String(i+1).padStart(2,'0')}`,
      tenantId: t.id, room: t.room, tenantName: t.name,
      type: 'daily',
      period: `${nights} คืน`,
      issueDate: '2026-05-' + String(22 + i),
      dueDate: '2026-05-' + String(22 + i + nights),
      items, total,
      status: i < 2 ? 'paid' : 'pending',
      paidAt: i < 2 ? '2026-05-' + String(22 + i) : null,
      paymentMethod: i < 2 ? 'โอนผ่าน QR PromptPay' : null,
    });
  });
  return out;
})();

/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <script src="image-slot.js"><\/script>
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();
</script>
<script type="text/babel">
// Shared UI primitives for TaiUnt Mansion Park.
// All visual tokens come from CSS custom props on :root (set by app shell from tweaks).

function Card({ children, style, padding = 20, hoverable, onClick, ...rest }) {
  return (
    <div
      onClick={onClick}
      className={'tu-card' + (hoverable ? ' tu-card-hover' : '')}
      style={{ padding, ...style }}
      {...rest}
    >
      {children}
    </div>
  );
}

function Stat({ label, value, sub, icon, tone = 'default' }) {
  return (
    <Card padding={18}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="tu-muted" style={{ fontSize: 12, fontWeight: 500, letterSpacing: '.02em' }}>{label}</div>
          <div style={{ fontSize: 28, fontWeight: 600, lineHeight: 1.1, marginTop: 6, fontVariantNumeric: 'tabular-nums' }}>{value}</div>
          {sub && <div className="tu-muted" style={{ fontSize: 12, marginTop: 6 }}>{sub}</div>}
        </div>
        {icon && (
          <div style={{
            width: 38, height: 38, borderRadius: 10,
            background: tone === 'primary' ? 'var(--primary-soft)' : 'var(--surface-2)',
            color: tone === 'primary' ? 'var(--primary)' : 'var(--text)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
          }}>{icon}</div>
        )}
      </div>
    </Card>
  );
}

function Badge({ tone = 'neutral', children, dot, size = 'md' }) {
  const palette = {
    green:   { bg: 'rgba(22,101,52,.10)',  fg: '#166534', dot: '#22a857' },
    amber:   { bg: 'rgba(180,120,0,.12)',  fg: '#9a6b00', dot: '#d8a534' },
    red:     { bg: 'rgba(180,40,40,.10)',  fg: '#b13e3e', dot: '#d44a4a' },
    orange:  { bg: 'rgba(200,90,30,.10)',  fg: '#b35a1f', dot: '#dd7531' },
    blue:    { bg: 'rgba(40,90,180,.10)',  fg: '#2b5db1', dot: '#3a76d4' },
    neutral: { bg: 'var(--surface-2)',     fg: 'var(--muted)', dot: 'var(--muted)' },
  }[tone] || { bg: 'var(--surface-2)', fg: 'var(--muted)', dot: 'var(--muted)' };
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: size === 'sm' ? '2px 8px' : '4px 10px',
      borderRadius: 999, background: palette.bg, color: palette.fg,
      fontSize: size === 'sm' ? 11 : 12, fontWeight: 500, lineHeight: 1.2,
      whiteSpace: 'nowrap',
    }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: palette.dot, flexShrink: 0 }} />}
      {children}
    </span>
  );
}

function Button({ children, variant = 'primary', size = 'md', icon, onClick, disabled, type = 'button', style, fullWidth }) {
  const sizes = {
    sm: { h: 30, padX: 12, fs: 12.5, gap: 6 },
    md: { h: 38, padX: 16, fs: 13.5, gap: 8 },
    lg: { h: 46, padX: 20, fs: 15, gap: 10 },
  }[size];
  const variants = {
    primary:   { bg: 'var(--primary)',     fg: '#fff',          border: 'transparent', hover: 'var(--primary-dark)' },
    secondary: { bg: 'var(--surface)',     fg: 'var(--text)',   border: 'var(--border)', hover: 'var(--surface-2)' },
    ghost:     { bg: 'transparent',        fg: 'var(--text)',   border: 'transparent', hover: 'var(--surface-2)' },
    danger:    { bg: '#fff',               fg: '#b13e3e',       border: 'rgba(180,40,40,.25)', hover: 'rgba(180,40,40,.06)' },
    accent:    { bg: 'var(--accent)',      fg: '#fff',          border: 'transparent', hover: 'var(--accent-dark)' },
  }[variant] || {};
  const [hover, setHover] = React.useState(false);
  return (
    <button type={type} disabled={disabled} onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: sizes.gap,
        height: sizes.h, padding: `0 ${sizes.padX}px`, fontSize: sizes.fs, fontWeight: 500,
        background: hover && !disabled ? variants.hover : variants.bg,
        color: variants.fg,
        border: `1px solid ${variants.border}`,
        borderRadius: 10, cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.5 : 1,
        transition: 'background .15s, transform .12s',
        width: fullWidth ? '100%' : 'auto',
        fontFamily: 'inherit', whiteSpace: 'nowrap',
        ...style,
      }}>
      {icon}
      {children}
    </button>
  );
}

function Input({ label, value, onChange, placeholder, type = 'text', suffix, prefix, rows, error, hint, style, ...rest }) {
  const isArea = rows && rows > 1;
  return (
    <label style={{ display: 'block', ...style }}>
      {label && <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 6 }}>{label}</div>}
      <div style={{
        display: 'flex', alignItems: 'center',
        border: `1px solid ${error ? 'rgba(180,40,40,.5)' : 'var(--border)'}`,
        borderRadius: 10, background: 'var(--surface)',
        padding: isArea ? '8px 12px' : '0 12px',
        transition: 'border-color .15s, box-shadow .15s',
      }}>
        {prefix && <span style={{ color: 'var(--muted)', marginRight: 8, fontSize: 13 }}>{prefix}</span>}
        {isArea ? (
          <textarea value={value} onChange={(e) => onChange?.(e.target.value)} placeholder={placeholder} rows={rows}
            style={{ flex: 1, border: 0, outline: 0, fontFamily: 'inherit', fontSize: 14, background: 'transparent', color: 'inherit', resize: 'vertical', minHeight: 80, padding: 0 }}
            {...rest} />
        ) : (
          <input type={type} value={value} onChange={(e) => onChange?.(e.target.value)} placeholder={placeholder}
            style={{ flex: 1, border: 0, outline: 0, fontFamily: 'inherit', fontSize: 14, background: 'transparent', color: 'inherit', height: 40, minWidth: 0 }}
            {...rest} />
        )}
        {suffix && <span style={{ color: 'var(--muted)', marginLeft: 8, fontSize: 13 }}>{suffix}</span>}
      </div>
      {hint && !error && <div style={{ fontSize: 11.5, color: 'var(--muted)', marginTop: 4 }}>{hint}</div>}
      {error && <div style={{ fontSize: 11.5, color: '#b13e3e', marginTop: 4 }}>{error}</div>}
    </label>
  );
}

function Tabs({ value, onChange, options }) {
  return (
    <div style={{
      display: 'inline-flex', padding: 4, borderRadius: 12,
      background: 'var(--surface-2)', border: '1px solid var(--border)',
      gap: 2,
    }}>
      {options.map((o) => {
        const active = o.value === value;
        return (
          <button key={o.value} onClick={() => onChange(o.value)}
            style={{
              padding: '6px 14px', fontSize: 13, fontWeight: 500,
              border: 0, borderRadius: 8,
              background: active ? 'var(--surface)' : 'transparent',
              color: active ? 'var(--text)' : 'var(--muted)',
              boxShadow: active ? '0 1px 2px rgba(0,0,0,.06), 0 0 0 1px var(--border)' : 'none',
              cursor: 'pointer', fontFamily: 'inherit', transition: 'all .15s',
              display: 'inline-flex', alignItems: 'center', gap: 6,
            }}>
            {o.icon}{o.label}
            {o.count != null && (
              <span style={{
                fontSize: 11, padding: '1px 6px', borderRadius: 999,
                background: active ? 'var(--primary-soft)' : 'rgba(0,0,0,.06)',
                color: active ? 'var(--primary)' : 'var(--muted)',
                fontVariantNumeric: 'tabular-nums',
              }}>{o.count}</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function Modal({ open, onClose, children, width = 560, title, footer }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(20, 30, 22, 0.45)',
      zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: 20, animation: 'tuFadeIn .2s ease-out',
      backdropFilter: 'blur(4px)',
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: '100%', maxWidth: width, maxHeight: '92vh', overflow: 'auto',
        background: 'var(--surface)', borderRadius: 16,

// PageFade — wrap content; fades in via JS state. Inverts the default
// (visible) state when flipKey changes by briefly applying tu-page-fade-init,
// then on next frame removing it so the transition runs back to visible.
function PageFade({ children, flipKey, style }) {
  const [animating, setAnimating] = React.useState(false);
  const firstRef = React.useRef(true);
  React.useEffect(() => {
    if (firstRef.current) { firstRef.current = false; return; }
    setAnimating(true);
    const id = requestAnimationFrame(() => requestAnimationFrame(() => setAnimating(false)));
    return () => cancelAnimationFrame(id);
  }, [flipKey]);
  return (
    <div className={'tu-page-fade' + (animating ? ' tu-page-fade-init' : '')} style={style}>
      {children}
    </div>
  );
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

});

function OccupancyDonut() {
  const buckets = ['occupied','vacant','booked','notice','maintenance'];
  const counts = buckets.map(s => ({ s, n: ROOMS.filter(r => r.status === s).length }));
  const total = ROOMS.length;
  const colorOf = (s) => ({
    occupied: 'var(--primary)',
    vacant: 'var(--surface-3)',
    booked: '#d8a534',
    notice: '#dd7531',
    maintenance: '#d44a4a',
  })[s];
  let acc = 0;
  const R = 60, C = 2 * Math.PI * R;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
      <div style={{ position: 'relative', width: 150, height: 150, flexShrink: 0 }}>
        <svg width={150} height={150} viewBox="0 0 150 150" style={{ transform: 'rotate(-90deg)' }}>
          {counts.map((c, i) => {
            const len = (c.n / total) * C;
            const off = -acc;
            acc += len;
            return (
              <circle key={c.s} cx={75} cy={75} r={R} fill="none"
                stroke={colorOf(c.s)} strokeWidth={18}
                strokeDasharray={`${len} ${C - len}`}
                strokeDashoffset={off}
                style={{ transition: 'stroke-dasharray .6s' }} />
            );
          })}
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ fontSize: 24, fontWeight: 600, lineHeight: 1 }}>{ROOMS.filter(r => r.status === 'occupied').length}</div>
          <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>เข้าพัก / {total}</div>
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {counts.map(c => (
          <div key={c.s} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ width: 10, height: 10, borderRadius: 2, background: colorOf(c.s), flexShrink: 0 }} />
            <span style={{ flex: 1, fontSize: 12.5 }}>{STATUS_META[c.s].th}</span>
            <span style={{ fontSize: 12.5, fontVariantNumeric: 'tabular-nums', fontWeight: 500 }}>{c.n}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
