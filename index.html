function AddRoomModal({ open, onClose, onDone }) {
  const [form, setForm] = React.useState({ id: '', floor: 1, number: '', type: 'monthly', rent: 4000, size: 28, bed: 'เตียงเดี่ยว' });
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState(null);
  const upd = (k, v) => setForm(p => ({ ...p, [k]: v }));

  React.useEffect(() => {
    if (open) setForm({ id: '', floor: 1, number: '', type: 'monthly', rent: 4000, size: 28, bed: 'เตียงเดี่ยว' });
    setError(null);
  }, [open]);

  const handleSave = async () => {
    if (!form.id.trim()) { setError('กรุณากรอกรหัสห้อง'); return; }
    if (!form.number) { setError('กรุณากรอกหมายเลขห้อง'); return; }
    if (ROOMS.find(r => r.id === form.id.trim())) { setError('รหัสห้องนี้มีอยู่แล้ว'); return; }
    setSaving(true); setError(null);
    const newRoom = {
      id: form.id.trim(),
      floor: Number(form.floor),
      number: Number(form.number),
      type: form.type,
      status: 'vacant',
      rent: Number(form.rent),
      size: Number(form.size),
      bed: form.bed,
    };
    try {
      if (window.sb) {
        const { error: e } = await window.sb.from('rooms').insert(newRoom);
        if (e) throw e;
        if (window.TU?.refreshData) await window.TU.refreshData();
      } else {
        ROOMS.push(newRoom);
      }
      onDone();
    } catch (e) {
      setError(e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
    } finally {
      setSaving(false);
    }
  };

  return (
    <Modal open={open} onClose={onClose} title="เพิ่มห้องใหม่" width={480}
      footer={<>
        <Button variant="secondary" onClick={onClose} disabled={saving}>ยกเลิก</Button>
        <Button onClick={handleSave} disabled={saving} icon={saving ? null : I.plus}>
          {saving ? 'กำลังบันทึก...' : 'เพิ่มห้อง'}
        </Button>
      </>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <Input label="รหัสห้อง (เช่น R301)" value={form.id} onChange={v => upd('id', v.toUpperCase())} placeholder="R301" />
          <div>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6, color: 'var(--muted)' }}>ชั้น</div>
            <select value={form.floor} onChange={e => upd('floor', e.target.value)} className="tu-select" style={{ width: '100%' }}>
              {[1, 2, 3, 4].map(f => <option key={f} value={f}>ชั้น {f}</option>)}
            </select>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <Input label="หมายเลขห้อง (เช่น 01)" value={form.number} onChange={v => upd('number', v)} placeholder="01" />
          <div>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6, color: 'var(--muted)' }}>ประเภท</div>
            <select value={form.type} onChange={e => upd('type', e.target.value)} className="tu-select" style={{ width: '100%' }}>
              <option value="monthly">รายเดือน</option>
              <option value="daily">รายวัน</option>
            </select>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <Input label="ค่าเช่า (บาท)" prefix="฿" value={form.rent} onChange={v => upd('rent', v)} />
          <Input label="ขนาดห้อง (ตร.ม.)" value={form.size} onChange={v => upd('size', v)} />
        </div>
        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6, color: 'var(--muted)' }}>ประเภทเตียง</div>
          <select value={form.bed} onChange={e => upd('bed', e.target.value)} className="tu-select" style={{ width: '100%' }}>
            <option value="เตียงเดี่ยว">เตียงเดี่ยว</option>
            <option value="เตียงคู่">เตียงคู่</option>
            <option value="เตียง Queen Size">เตียง Queen Size</option>
            <option value="เตียง King Size">เตียง King Size</option>
          </select>
        </div>
        {error && <div style={{ padding: '10px 14px', borderRadius: 10, background: '#fcd2d2', color: '#9b1c1c', fontSize: 13 }}>{error}</div>}
      </div>
    </Modal>
  );
}

// ─── Room Map ────────────────────────────────────────────────────────────
function AdminRooms({ goto }) {
  const [filterType, setFilterType] = React.useState('all');
  const [filterStatus, setFilterStatus] = React.useState('all');
  const [selected, setSelected] = React.useState(null);
  const [showAddRoom, setShowAddRoom] = React.useState(false);

  const filtered = ROOMS.filter(r => {
    if (filterType !== 'all' && r.type !== filterType) return false;
    if (filterStatus !== 'all' && r.status !== filterStatus) return false;
    return true;
  });
  const floors = [1, 2, 3, 4];

  const typeOpts = [
    { value: 'all', label: 'ทั้งหมด', count: ROOMS.length },
    { value: 'monthly', label: 'รายเดือน', count: ROOMS.filter(r => r.type === 'monthly').length },
    { value: 'daily', label: 'รายวัน', count: ROOMS.filter(r => r.type === 'daily').length },
  ];

  const statusOpts = [
    { value: 'all', label: 'ทุกสถานะ' },
    ...Object.entries(STATUS_META).map(([k, v]) => ({ value: k, label: v.th })),
  ];

  const exportCSV = () => {
    const statusTh = { vacant: 'ว่าง', booked: 'จอง', occupied: 'เข้าพัก', notice: 'แจ้งออก', maintenance: 'ปิดซ่อม', cleaning: 'ทำความสะอาด' };
    const rows = [['รหัสห้อง', 'ชั้น', 'หมายเลข', 'ประเภท', 'สถานะ', 'ค่าเช่า (฿)', 'ขนาด (ตร.ม.)', 'เตียง', 'ผู้เข้าพัก']];
    ROOMS.forEach(r => {
      const t = TENANTS.find(t => t.room === r.id);
      rows.push([r.id, r.floor, r.number || '', r.type === 'monthly' ? 'รายเดือน' : 'รายวัน', statusTh[r.status] || r.status, r.rent, r.size || '', r.bed || '', t ? t.name : '']);
    });
    const csv = '﻿' + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = `room-map-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  return (
    <div className="tu-page">
      <PageHeader title="ผังห้อง" subtitle="Room Map — ดูสถานะและจัดการห้องทั้งหมด"
        actions={<>
          <Button variant="secondary" size="sm" icon={I.download} onClick={exportCSV}>ส่งออกผัง</Button>
          <Button size="sm" icon={I.plus} onClick={() => setShowAddRoom(true)}>เพิ่มห้องใหม่</Button>
        </>}
      />

      {/* Filters */}
      <Card padding={16}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 14, alignItems: 'center' }}>
          <Tabs value={filterType} onChange={setFilterType} options={typeOpts} />
          <div style={{ height: 24, width: 1, background: 'var(--border)' }} />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span className="tu-muted" style={{ fontSize: 12.5 }}>สถานะ</span>
            <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}
              className="tu-select">
              {statusOpts.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
            </select>
          </div>
          <div style={{ flex: 1 }} />
          <RoomLegend />
        </div>
      </Card>

      {/* Floors */}
      {floors.map(f => {
        const onFloor = filtered.filter(r => r.floor === f);
        if (onFloor.length === 0) return null;
        const isDailyFloor = f === 4;
        return (
          <Card key={f} padding={20}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
              <div style={{
                width: 38, height: 38, borderRadius: 10,
                background: 'var(--primary-soft)', color: 'var(--primary)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 15, fontWeight: 600,
              }}>F{f}</div>
              <div>
                <div style={{ fontSize: 15, fontWeight: 600 }}>ชั้น {f}</div>
                <div className="tu-muted" style={{ fontSize: 12 }}>
                  {isDailyFloor ? 'ห้องรายวัน' : 'ห้องรายเดือน'} • {onFloor.length} ห้อง •
                  เข้าพัก {onFloor.filter(r => r.status === 'occupied').length} ห้อง
                </div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(9, 1fr)', gap: 10 }}>
              {onFloor.map(r => <RoomTile key={r.id} room={r} onClick={() => setSelected(r)} />)}
            </div>
          </Card>
        );
      })}

      <RoomDetailModal room={selected} onClose={() => setSelected(null)} goto={goto} />
      <AddRoomModal open={showAddRoom} onClose={() => setShowAddRoom(false)} onDone={() => { setShowAddRoom(false); if (window.TU?.refreshData) window.TU.refreshData(); }} />
    </div>
  );
}

function RoomLegend() {
  return (
    <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', alignItems: 'center' }}>
      {Object.entries(STATUS_META).map(([k, v]) => (
        <span key={k} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 11.5, color: 'var(--muted)' }}>
          <span style={{ width: 10, height: 10, borderRadius: 3, background: roomFill(k) }} />
          {v.th}
        </span>
      ))}
      <span style={{ width: 1, height: 14, background: 'var(--border)' }} />
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11.5, color: 'var(--muted)' }}>
        <span style={{ width: 16, height: 16, borderRadius: '50%', background: 'var(--primary)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9.5, fontWeight: 700 }}>ด</span>
        รายเดือน
      </span>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11.5, color: 'var(--muted)' }}>
        <span style={{ width: 16, height: 16, borderRadius: '50%', background: '#f59e0b', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 9.5, fontWeight: 700 }}>ว</span>
        รายวัน
      </span>
    </div>
  );
}

function roomFill(status) {
  return ({
    vacant: 'var(--surface-3)',
    booked: '#fef3c7',
    occupied: 'var(--primary)',
    notice: '#fde2c8',
    maintenance: '#fcd2d2',
    cleaning: '#dbeafe',
  })[status];
}

function roomTextColor(status) {
  return status === 'occupied' ? '#fff' : 'var(--text)';
}

function RoomTile({ room, onClick }) {
  const isDaily = room.type === 'daily';
  const occupied = room.status === 'occupied';
  return (
    <button onClick={onClick} className="tu-room-tile"
      style={{
        background: roomFill(room.status),
        color: roomTextColor(room.status),
        border: occupied ? '1px solid var(--primary-dark)' : '1px solid var(--border)',
        position: 'relative',
      }}>
      {/* Type marker — corner pill */}
      <span title={isDaily ? 'รายวัน' : 'รายเดือน'} style={{
        position: 'absolute', top: 5, right: 5,
        width: 16, height: 16, borderRadius: '50%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 9.5, fontWeight: 700, lineHeight: 1,
        background: isDaily
          ? (occupied ? 'rgba(255,255,255,.9)' : '#f59e0b')
          : (occupied ? 'rgba(255,255,255,.9)' : 'var(--primary)'),
        color: isDaily
          ? (occupied ? '#b35a1f' : '#fff')
          : (occupied ? 'var(--primary)' : '#fff'),
      }}>{isDaily ? 'ว' : 'ด'}</span>
      <div style={{ fontSize: 14, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{room.id}</div>
      <div style={{ fontSize: 10, opacity: .75, marginTop: 2 }}>{STATUS_META[room.status].th}</div>
    </button>
  );
}

function RoomDetailModal({ room, onClose, goto }) {
  const [, force] = React.useReducer(x => x + 1, 0);
  const [checkout, setCheckout] = React.useState(false);
  const [deleting, setDeleting] = React.useState(false);
  const [marking, setMarking] = React.useState(false);
  if (!room) return null;
  const tenant = TENANTS.find(t => t.room === room.id);
  const invoice = INVOICES.find(i => i.room === room.id && i.status !== 'paid');
  const canSwitchType = room.status === 'vacant';

  const markVacant = async () => {
    setMarking(true);
    try {
      if (window.sb) {
        const { error } = await window.sb.from('rooms').update({ status: 'vacant' }).eq('id', room.id);
        if (error) throw error;
        if (window.TU?.refreshData) await window.TU.refreshData();
      } else {
        room.status = 'vacant'; force();
      }
      onClose();
    } catch (e) {
      alert('อัปเดตสถานะไม่สำเร็จ: ' + (e.message || e));
    } finally {
      setMarking(false);
    }
  };

  const handleDelete = async () => {
    if (!window.confirm(`ยืนยันลบห้อง ${room.id}? ไม่สามารถกู้คืนได้`)) return;
    setDeleting(true);
    try {
      if (window.sb) {
        const { error: e } = await window.sb.from('rooms').delete().eq('id', room.id);
        if (e) throw e;
        if (window.TU?.refreshData) await window.TU.refreshData();
      } else {
        const idx = ROOMS.findIndex(r => r.id === room.id);
        if (idx !== -1) ROOMS.splice(idx, 1);
      }
      onClose();
    } catch (e) {
      alert('ลบไม่สำเร็จ: ' + (e.message || e));
    } finally {
      setDeleting(false);
    }
  };

  const switchType = async (newType) => {
    if (room.type === newType) return;
    const defPr = RATE_CONFIG.presets.find(p => p.type === newType);
    const newRent = defPr ? defPr.rent : (newType === 'monthly' ? 4000 : 500);
    const newSize = newType === 'monthly' ? 24 : 18;
    const newBed  = newType === 'monthly' ? 'เตียงคู่' : 'เตียงเดี่ยว';
    room.type = newType; room.rent = newRent; room.size = newSize; room.bed = newBed;
    force();
    if (window.sb) {
      await window.sb.from('rooms').update({ type: newType, rent: newRent, size: newSize, bed: newBed }).eq('id', room.id);
      if (window.TU?.refreshData) window.TU.refreshData();
    }
  };

  return (
    <Modal open={!!room} onClose={onClose} title={`ห้อง ${room.id}`} width={580}
      footer={<>
        {room.status === 'vacant' && <Button variant="danger" onClick={handleDelete} disabled={deleting}>{deleting ? 'กำลังลบ...' : 'ลบห้องนี้'}</Button>}
        <div style={{ flex: 1 }} />
        <Button variant="secondary" onClick={onClose}>ปิด</Button>
        {room.status === 'cleaning' && <Button onClick={markVacant} disabled={marking}>{marking ? 'กำลังบันทึก...' : 'ทำความสะอาดเสร็จแล้ว → ห้องว่าง'}</Button>}
        {room.status === 'vacant' && <Button onClick={() => { onClose(); goto('tenants'); }}>จองห้องนี้</Button>}
        {room.status === 'occupied' && <Button onClick={() => { onClose(); goto('billing'); }}>ดูใบแจ้งหนี้</Button>}
      </>}>
      <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start', marginBottom: 20 }}>
        <div style={{
          width: 88, height: 88, borderRadius: 14,
          background: roomFill(room.status), color: roomTextColor(room.status),
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          fontWeight: 600,
        }}>
          <div style={{ fontSize: 24 }}>{room.id}</div>
          <div style={{ fontSize: 11, marginTop: 2, opacity: .8 }}>ชั้น {room.floor}</div>
        </div>
        <div style={{ flex: 1 }}>
          <Badge tone={STATUS_META[room.status].tone} dot>{STATUS_META[room.status].th}</Badge>
          <div style={{ marginTop: 10, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <KV label="ประเภท" value={room.type === 'monthly' ? 'รายเดือน' : 'รายวัน'} />
            <KV label="ขนาด" value={`${room.size} ตร.ม.`} />
            <KV label="เตียง" value={room.bed} />
            <KV label="ค่าเช่า" value={`฿${room.rent.toLocaleString()} / ${room.type === 'monthly' ? 'เดือน' : 'คืน'}`} />
          </div>
        </div>
      </div>

      {/* Change room type */}
      <div style={{ marginBottom: 16 }}>
        <SectionTitle>ประเภทการเช่า</SectionTitle>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {[
            { v: 'monthly', t: 'รายเดือน' },
            { v: 'daily',   t: 'รายวัน' },
          ].map(o => {
            const pr = RATE_CONFIG.presets.find(p => p.type === o.v);
            const active = room.type === o.v;
            return (
              <button key={o.v} onClick={() => canSwitchType && switchType(o.v)} disabled={!canSwitchType}
                style={{
                  textAlign: 'left', padding: '12px 14px', borderRadius: 10, fontFamily: 'inherit',
                  border: active ? '2px solid var(--primary)' : '1px solid var(--border)',
                  background: active ? 'var(--primary-soft)' : 'var(--surface)',
                  cursor: canSwitchType ? 'pointer' : 'not-allowed',
                  opacity: !canSwitchType && !active ? .45 : 1,
                  transition: 'all .15s',
                }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span style={{ fontSize: 13.5, fontWeight: 600, color: active ? 'var(--primary)' : 'var(--text)' }}>{o.t}</span>
                  {active && <span style={{ color: 'var(--primary)', display: 'flex' }}>{I.check}</span>}
                </div>
                <div className="tu-muted" style={{ fontSize: 11.5, marginTop: 2 }}>{pr ? `฿${pr.rent.toLocaleString()} / ${o.v === 'monthly' ? 'เดือน' : 'คืน'}` : '—'}</div>
              </button>
            );
          })}
        </div>
        <div className="tu-muted" style={{ fontSize: 11.5, marginTop: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
          {canSwitchType
            ? 'เลือกเพื่อเปลี่ยนประเภทห้อง — ค่าเช่าและรายละเอียดจะปรับอัตโนมัติ'
            : 'เปลี่ยนประเภทได้เฉพาะห้องว่างเท่านั้น (ห้องนี้มีผู้เข้าพัก/ถูกจองอยู่)'}
        </div>
      </div>

      {tenant && (
        <div>
          <SectionTitle>ผู้เข้าพัก</SectionTitle>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'var(--surface-2)', borderRadius: 12 }}>
            <Avatar name={tenant.name} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 500 }}>{tenant.name}</div>
              <div className="tu-muted" style={{ fontSize: 12 }}>{tenant.phone} • เข้าพักตั้งแต่ {formatDate(tenant.checkIn)}</div>
            </div>
            <Badge tone="green">รหัส {tenant.id}</Badge>
          </div>
        </div>
      )}

      {invoice && (
        <div style={{ marginTop: 16 }}>
          <SectionTitle>ใบแจ้งหนี้ค้างชำระ</SectionTitle>
          <div className="tu-list-row" style={{ background: 'var(--surface-2)', borderRadius: 12, padding: 14 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13.5, fontWeight: 500 }}>{invoice.id}</div>
              <div className="tu-muted" style={{ fontSize: 12 }}>{invoice.period} • ครบกำหนด {formatDate(invoice.dueDate)}</div>
            </div>
            <div style={{ fontSize: 16, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>฿{invoice.total.toLocaleString()}</div>
          </div>
        </div>
      )}

      <div style={{ marginTop: 16 }}>
        <SectionTitle>การกระทำ</SectionTitle>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
          <ActionTile label="ย้ายห้อง" disabled={room.status !== 'occupied'} />
          <ActionTile label="แจ้งออก / คืนมัดจำ" disabled={room.status !== 'occupied'} onClick={() => setCheckout(true)} />
          <ActionTile label="ปิดซ่อม" disabled={room.status === 'occupied'} />
        </div>
      </div>

      <CheckoutModal room={checkout ? room : null} onClose={() => setCheckout(false)} />
    </Modal>
  );
}

function ActionTile({ label, disabled, onClick }) {
  return (
    <button disabled={disabled} onClick={onClick} style={{
      padding: '12px 10px', borderRadius: 10, border: '1px solid var(--border)',
      background: 'var(--surface)', color: 'var(--text)',
      fontSize: 13, fontFamily: 'inherit', cursor: disabled ? 'not-allowed' : 'pointer',
      opacity: disabled ? .4 : 1, transition: 'background .15s',
    }} onMouseEnter={(e) => { if (!disabled) e.currentTarget.style.background = 'var(--surface-2)'; }}
       onMouseLeave={(e) => e.currentTarget.style.background = 'var(--surface)'}>
      {label}
    </button>
  );
}

// ─── Checkout / move-out settlement (แจ้งออก + คืนเงินมัดจำ) ──────────────
function CheckoutModal({ room, onClose }) {
  const isDaily = room && room.type === 'daily';
  const deposit = isDaily ? 200 : 5000;
  const cleaningFee = isDaily ? 0 : 500;
  const [damages, setDamages] = React.useState([]);
  const [done, setDone] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  React.useEffect(() => { if (room) { setDamages([]); setDone(false); setSaving(false); } }, [room && room.id]);

  const handleCheckout = async () => {
    if (!window.sb) { setDone(true); return; }
    setSaving(true);
    const today = new Date().toISOString().slice(0, 10);
    await Promise.all([
      window.sb.from('rooms').update({ status: 'vacant' }).eq('id', room.id),
      window.sb.from('tenants').update({ check_out: today }).eq('room_id', room.id).is('check_out', null),
    ]);
    if (window.TU?.refreshData) await window.TU.refreshData();
    setSaving(false);
    setDone(true);
  };
  if (!room) return null;

  const tenant = window.TUMP_DATA.TENANTS.find(t => t.room === room.id);
  const damageTotal = damages.reduce((s, d) => s + (Number(d.amount) || 0), 0);
  const deductions = cleaningFee + damageTotal;
  const refund = deposit - deductions;
  const addDamage = () => setDamages(p => [...p, { label: '', amount: '' }]);
  const setDamage = (i, k, v) => setDamages(p => p.map((d, idx) => idx === i ? { ...d, [k]: v } : d));
  const rmDamage = (i) => setDamages(p => p.filter((_, idx) => idx !== i));

  if (done) {
    return (
      <Modal open={!!room} onClose={onClose} title="ใบคืนเงินมัดจำ / สรุปการแจ้งออก" width={520}
        footer={<>
          <Button variant="secondary" onClick={onClose}>ปิด</Button>
          <Button variant="secondary" icon={I.download}>ดาวน์โหลด PDF</Button>
          <Button icon={I.print}>พิมพ์</Button>
        </>}>
        <div style={{ border: '2px dashed var(--border)', borderRadius: 14, padding: 28, background: 'var(--surface-2)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--primary)' }}>{I.logo}<span style={{ fontWeight: 700, fontSize: 14 }}>ไท้อันแมนชั่น ปาร์ค</span></div>
              <div className="tu-muted" style={{ fontSize: 11, marginTop: 4 }}>สรุปการแจ้งออกและคืนเงินมัดจำ</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontWeight: 700, fontSize: 14, letterSpacing: '.03em' }}>คืนเงินมัดจำ</div>
              <div className="tu-muted" style={{ fontSize: 11, marginTop: 2 }}>26 พ.ค. 2569</div>
            </div>
          </div>
          <div style={{ paddingBottom: 14, borderBottom: '1px solid var(--border)', marginBottom: 12 }}>
            <div className="tu-muted" style={{ fontSize: 11.5 }}>ผู้เช่า</div>
            <div style={{ fontSize: 14, fontWeight: 500, marginTop: 2 }}>{tenant ? tenant.name : '—'}</div>
            <div className="tu-muted" style={{ fontSize: 12 }}>ห้อง {room.id} • {isDaily ? 'รายวัน' : 'รายเดือน'}</div>
          </div>
          <RefundLine label={isDaily ? 'เงินมัดจำกุญแจ' : 'เงินมัดจำประกัน'} value={deposit} />
          {cleaningFee > 0 && <RefundLine label="หัก ค่าทำความสะอาดห้อง" value={-cleaningFee} />}
          {damages.filter(d => d.label || d.amount).map((d, i) => (
            <RefundLine key={i} label={`หัก ${d.label || 'ค่าเสียหาย'}`} value={-(Number(d.amount) || 0)} />
          ))}
          <div style={{ display: 'flex', justifyContent: 'space-between', borderTop: '2px solid var(--text)', paddingTop: 12, marginTop: 10 }}>
            <span style={{ fontWeight: 600 }}>{refund >= 0 ? 'คืนเงินสุทธิ' : 'เรียกเก็บเพิ่ม'}</span>
            <span style={{ fontSize: 20, fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: refund >= 0 ? 'var(--primary)' : '#b13e3e' }}>฿{Math.abs(refund).toLocaleString()}</span>
          </div>
          <div style={{ marginTop: 14, fontSize: 11.5, color: 'var(--muted)', textAlign: 'center' }}>
            {refund >= 0 ? 'ทางหอได้คืนเงินมัดจำเรียบร้อยแล้ว' : 'ผู้เช่าต้องชำระส่วนต่างเพิ่มเติม'} • ขอบคุณที่ใช้บริการ
          </div>
        </div>
      </Modal>
    );
  }

  return (
    <Modal open={!!room} onClose={onClose} title={`แจ้งออก — ห้อง ${room.id}`} width={560}
      footer={<>
        <Button variant="secondary" onClick={onClose}>ยกเลิก</Button>
        <Button icon={saving ? null : I.check} onClick={handleCheckout} disabled={saving}>
          {saving ? 'กำลังบันทึก...' : 'ยืนยันแจ้งออก & ออกใบคืนเงิน'}
        </Button>
      </>}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
        <Avatar name={tenant ? tenant.name : 'ผู้เช่า'} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 500 }}>{tenant ? tenant.name : '—'}</div>
          <div className="tu-muted" style={{ fontSize: 12 }}>ห้อง {room.id} • {isDaily ? 'รายวัน' : 'รายเดือน'}</div>
        </div>
        <Badge tone={isDaily ? 'amber' : 'green'}>{isDaily ? 'Check-out รายวัน' : 'แจ้งออกรายเดือน'}</Badge>
      </div>

      {!isDaily && (
        <div style={{ padding: 12, background: 'rgba(216,165,52,.08)', borderRadius: 10, marginBottom: 16, fontSize: 12.5, color: '#9a6b00', display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <span style={{ marginTop: 1 }}>ℹ️</span>
          <span>ห้องรายเดือนต้องแจ้งออกล่วงหน้า <strong>1 เดือน</strong> • หักค่าทำความสะอาดห้อง <strong>฿500</strong> และค่าเสียหายอื่นๆ (ถ้ามี) จากเงินมัดจำ</span>
        </div>
      )}
      {isDaily && (
        <div style={{ padding: 12, background: 'var(--primary-soft)', borderRadius: 10, marginBottom: 16, fontSize: 12.5, color: 'var(--primary)', display: 'flex', gap: 8, alignItems: 'flex-start' }}>
          <span style={{ marginTop: 1 }}>ℹ️</span>
          <span>Check-out รายวัน — คืนเงิน<strong>มัดจำกุญแจ ฿200</strong> เต็มจำนวน (หากไม่มีความเสียหาย)</span>
        </div>
      )}

      {/* Settlement breakdown */}
      <div style={{ border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
        <SettleRow label={isDaily ? 'เงินมัดจำกุญแจ' : 'เงินมัดจำประกัน'} value={`฿${deposit.toLocaleString()}`} bold />
        {cleaningFee > 0 && <SettleRow label="หัก ค่าทำความสะอาดห้อง" value={`−฿${cleaningFee.toLocaleString()}`} negative />}
        {damages.map((d, i) => (
          <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'center', padding: '8px 14px', borderTop: '1px solid var(--border)' }}>
            <input value={d.label} onChange={(e) => setDamage(i, 'label', e.target.value)} placeholder="รายการค่าเสียหาย เช่น กระจกแตก"
              style={{ flex: 1, height: 34, border: '1px solid var(--border)', borderRadius: 8, padding: '0 10px', fontFamily: 'inherit', fontSize: 13, background: 'var(--surface)', color: 'inherit' }} />
            <div style={{ display: 'flex', alignItems: 'center', border: '1px solid var(--border)', borderRadius: 8, padding: '0 10px', background: 'var(--surface)', width: 110 }}>
              <span style={{ color: 'var(--muted)', fontSize: 13 }}>฿</span>
              <input type="number" value={d.amount} onChange={(e) => setDamage(i, 'amount', e.target.value)} placeholder="0"
                style={{ width: '100%', height: 34, border: 0, outline: 0, fontFamily: 'inherit', fontSize: 13, background: 'transparent', color: 'inherit', textAlign: 'right' }} />
            </div>
            <button onClick={() => rmDamage(i)} style={{ width: 30, height: 34, border: '1px solid var(--border)', borderRadius: 8, background: 'var(--surface)', cursor: 'pointer', color: 'var(--muted)' }}>✕</button>
          </div>
        ))}
        <div style={{ padding: '10px 14px', borderTop: '1px solid var(--border)' }}>
          <button className="tu-link" onClick={addDamage}>+ เพิ่มค่าเสียหาย</button>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px', borderTop: '2px solid var(--text)', background: 'var(--surface-2)' }}>
          <span style={{ fontWeight: 600, fontSize: 13.5 }}>{refund >= 0 ? 'คืนเงินสุทธิให้ผู้เช่า' : 'เรียกเก็บเพิ่มจากผู้เช่า'}</span>
          <span style={{ fontSize: 20, fontWeight: 700, fontVariantNumeric: 'tabular-nums', color: refund >= 0 ? 'var(--primary)' : '#b13e3e' }}>฿{Math.abs(refund).toLocaleString()}</span>
        </div>
      </div>
    </Modal>
  );
}

function SettleRow({ label, value, bold, negative }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 14px', fontSize: 13.5 }}>
      <span style={{ fontWeight: bold ? 600 : 400 }}>{label}</span>
      <span style={{ fontVariantNumeric: 'tabular-nums', fontWeight: bold ? 600 : 500, color: negative ? '#b35a1f' : 'var(--text)' }}>{value}</span>
    </div>
  );
}

function RefundLine({ label, value }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '7px 0', fontSize: 13 }}>
      <span style={{ color: value < 0 ? 'var(--muted)' : 'var(--text)' }}>{label}</span>
      <span style={{ fontVariantNumeric: 'tabular-nums', color: value < 0 ? '#b35a1f' : 'var(--text)' }}>{value < 0 ? '−' : ''}฿{Math.abs(value).toLocaleString()}</span>
    </div>
  );
}

// ─── Rate & Payment Config (persisted to localStorage) ───────────────────
function loadRateConfig() { try { const v = localStorage.getItem('TU_RATE_CONFIG'); return v ? JSON.parse(v) : null; } catch { return null; } }
let RATE_CONFIG = loadRateConfig() || {
  presets: [
    { id: 'monthly-std',  label: 'รายเดือน มาตรฐาน', type: 'monthly', rent: 4000, deposit: 5000 },
    { id: 'monthly-prem', label: 'รายเดือน พรีเมียม',  type: 'monthly', rent: 5000, deposit: 10000 },
    { id: 'daily-std',    label: 'รายวัน มาตรฐาน',    type: 'daily',   rent: 500,  deposit: 200 },
    { id: 'daily-prem',   label: 'รายวัน พรีเมียม',   type: 'daily',   rent: 600,  deposit: 200 },
  ],
  paymentMethods: [
    { id: 'qr',   label: 'QR PromptPay',  detail: '' },
    { id: 'bank', label: 'โอนธนาคาร',     detail: '' },
    { id: 'cash', label: 'เงินสด',         detail: 'รับที่สำนักงาน' },
  ],
  keyDeposit: 200,
};
function saveRateConfig() { try { localStorage.setItem('TU_RATE_CONFIG', JSON.stringify(RATE_CONFIG)); } catch {} }

// ─── Rate Settings Modal ──────────────────────────────────────────────────
function RateSettingsModal({ open, onClose }) {
  const [cfg, setCfg] = React.useState(null);
  const [np, setNp] = React.useState({ type: 'monthly', label: '', rent: '', deposit: '' });
  const [npm, setNpm] = React.useState({ label: '', detail: '' });

  React.useEffect(() => {
    if (open) setCfg(JSON.parse(JSON.stringify(RATE_CONFIG)));
  }, [open]);

  if (!open || !cfg) return null;

  const addPreset = () => {
    if (!np.label || !np.rent) return;
    setCfg(c => ({ ...c, presets: [...c.presets, { id: Date.now().toString(), type: np.type, label: np.label, rent: Number(np.rent), deposit: Number(np.deposit) || 0 }] }));
    setNp({ type: 'monthly', label: '', rent: '', deposit: '' });
  };
  const addPM = () => {
    if (!npm.label) return;
    setCfg(c => ({ ...c, paymentMethods: [...c.paymentMethods, { id: Date.now().toString(), label: npm.label, detail: npm.detail }] }));
    setNpm({ label: '', detail: '' });
  };
  const save = () => { Object.assign(RATE_CONFIG, cfg); saveRateConfig(); onClose(); };

  const inputStyle = { height: 34, border: '1px solid var(--border)', borderRadius: 8, padding: '0 10px', fontSize: 13, fontFamily: 'inherit', background: 'var(--surface)', color: 'var(--text)', width: '100%', outline: 'none' };
  const rowStyle = { display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: 'var(--surface-2)', borderRadius: 10, marginBottom: 6 };
  const delBtn = { width: 26, height: 26, border: 0, borderRadius: 6, background: 'rgba(180,40,40,.08)', color: '#b13e3e', cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 };

  return (
    <Modal open={open} onClose={onClose} title="ตั้งค่าอัตราค่าเช่า & วิธีชำระเงิน" width={580}
      footer={<><Button variant="secondary" onClick={onClose}>ยกเลิก</Button><Button onClick={save} icon={I.check}>บันทึก</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>

        {/* Rate presets */}
        <div>
          <SectionTitle>อัตราค่าเช่า (Quick Presets)</SectionTitle>
          {cfg.presets.map((p, i) => (
            <div key={p.id} style={rowStyle}>
              <Badge tone={p.type === 'monthly' ? 'blue' : 'orange'} style={{ flexShrink: 0 }}>{p.type === 'monthly' ? 'เดือน' : 'วัน'}</Badge>
              <div style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{p.label}</div>
              <div className="tu-muted" style={{ fontSize: 12, whiteSpace: 'nowrap' }}>฿{p.rent.toLocaleString()} / มัดจำ ฿{p.deposit.toLocaleString()}</div>
              <button style={delBtn} onClick={() => setCfg(c => ({ ...c, presets: c.presets.filter((_, j) => j !== i) }))}>✕</button>
            </div>
          ))}
          <div style={{ display: 'grid', gridTemplateColumns: '90px 1fr 100px 100px auto', gap: 6, marginTop: 10 }}>
            <select value={np.type} onChange={e => setNp(p => ({ ...p, type: e.target.value }))} style={inputStyle}>
              <option value="monthly">รายเดือน</option>
              <option value="daily">รายวัน</option>
            </select>
            <input style={inputStyle} placeholder="ชื่ออัตรา เช่น พรีเมียม A" value={np.label} onChange={e => setNp(p => ({ ...p, label: e.target.value }))} />
            <input style={inputStyle} placeholder="ค่าเช่า" type="number" value={np.rent} onChange={e => setNp(p => ({ ...p, rent: e.target.value }))} />
            <input style={inputStyle} placeholder="มัดจำ" type="number" value={np.deposit} onChange={e => setNp(p => ({ ...p, deposit: e.target.value }))} />
            <Button size="sm" icon={I.plus} onClick={addPreset} disabled={!np.label || !np.rent}>เพิ่ม</Button>
          </div>
        </div>

        {/* Key deposit */}
        <div>
          <SectionTitle>เงินมัดจำกุญแจ (เก็บตอนเช็คอิน คืนตอนเช็คเอ้าท์)</SectionTitle>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span className="tu-muted" style={{ fontSize: 13 }}>฿</span>
            <input style={{ ...inputStyle, width: 120 }} type="number" value={cfg.keyDeposit ?? 200}
              onChange={e => setCfg(c => ({ ...c, keyDeposit: Number(e.target.value) || 0 }))} />
          </div>
        </div>

        {/* Payment methods */}
        <div>
          <SectionTitle>วิธีชำระเงิน</SectionTitle>
          {cfg.paymentMethods.map((pm, i) => (
            <div key={pm.id} style={rowStyle}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{pm.label}</div>
                {pm.detail && <div className="tu-muted" style={{ fontSize: 12 }}>{pm.detail}</div>}
              </div>
              <button style={delBtn} onClick={() => setCfg(c => ({ ...c, paymentMethods: c.paymentMethods.filter((_, j) => j !== i) }))}>✕</button>
            </div>
          ))}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr auto', gap: 6, marginTop: 10 }}>
            <input style={inputStyle} placeholder="ชื่อ เช่น โอนกสิกรไทย" value={npm.label} onChange={e => setNpm(p => ({ ...p, label: e.target.value }))} />
            <input style={inputStyle} placeholder="รายละเอียด เช่น 123-4-56789-0" value={npm.detail} onChange={e => setNpm(p => ({ ...p, detail: e.target.value }))} />
            <Button size="sm" icon={I.plus} onClick={addPM} disabled={!npm.label}>เพิ่ม</Button>
          </div>
        </div>

      </div>
    </Modal>
  );
}

// ─── Tenants ────────────────────────────────────────────────────────────
function AdminTenants() {
  const [tab, setTab] = React.useState('list');
  const [pendingCount, setPendingCount] = React.useState(0);

  const loadPending = React.useCallback(async () => {
    if (!window.sb) return;
    const { count } = await window.sb.from('profiles')
      .select('*', { count: 'exact', head: true })
      .eq('role', 'tenant').is('room_id', null);
    setPendingCount(count || 0);
  }, []);

  React.useEffect(() => { loadPending(); }, []);

  return (
    <div className="tu-page">
      <PageHeader title="ผู้เข้าพัก" subtitle="Tenants — ทะเบียนผู้เข้าพักและการลงทะเบียนใหม่" />
      <Tabs value={tab} onChange={setTab} options={[
        { value: 'list', label: 'ทะเบียนผู้เข้าพัก', count: TENANTS.length },
        { value: 'pending', label: 'รออนุมัติ', count: pendingCount || undefined },
        { value: 'register', label: 'ลงทะเบียนใหม่ (Admin)' },
      ]} />
      {tab === 'list' && <TenantList />}
      {tab === 'pending' && <AdminPendingTenants onApproved={loadPending} />}
      {tab === 'register' && <TenantRegister onDone={() => setTab('list')} />}
    </div>
  );
}

function TenantList() {
  const [query, setQuery] = React.useState('');
  const [type, setType] = React.useState('all');
  const [selected, setSelected] = React.useState(null);
  const filtered = TENANTS.filter(t => {
    if (type !== 'all' && t.type !== type) return false;
    if (query && !(t.name.includes(query) || t.room.includes(query) || t.id.includes(query))) return false;
    return true;
  });
  return (
    <Card padding={0}>
      <div style={{ display: 'flex', gap: 12, padding: 16, borderBottom: '1px solid var(--border)', alignItems: 'center' }}>
        <div style={{ flex: 1, maxWidth: 360 }}>
          <Input prefix={I.search} placeholder="ค้นหาชื่อ, รหัส, ห้อง..." value={query} onChange={setQuery} />
        </div>
        <Tabs value={type} onChange={setType} options={[
          { value: 'all', label: 'ทั้งหมด' },
          { value: 'monthly', label: 'รายเดือน' },
          { value: 'daily', label: 'รายวัน' },
        ]} />
      </div>
      <table className="tu-table">
        <thead>
          <tr>
            <th>รหัส</th><th>ชื่อผู้เข้าพัก</th><th>ห้อง</th><th>ประเภท</th>
            <th>เบอร์โทร</th><th>เข้าพักตั้งแต่</th><th>สถานะ</th><th></th>
          </tr>
        </thead>
        <tbody>
          {filtered.map(t => (
            <tr key={t.id}>
              <td style={{ fontFamily: 'ui-monospace,monospace', fontSize: 12 }}>{t.id}</td>
              <td>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <Avatar name={t.name} size={28} />
                  <span style={{ fontWeight: 500 }}>{t.name}</span>
                </div>
              </td>
              <td><Badge tone="neutral">{t.room}</Badge></td>
              <td>{t.type === 'monthly' ? 'รายเดือน' : 'รายวัน'}</td>
              <td style={{ fontVariantNumeric: 'tabular-nums' }}>{t.phone}</td>
              <td>{formatDate(t.checkIn)}</td>
              <td><Badge tone={STATUS_META[t.status].tone} dot>{STATUS_META[t.status].th}</Badge></td>
              <td><button className="tu-link" onClick={() => setSelected(t)}>ดูข้อมูล →</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <TenantDetailModal tenant={selected} onClose={() => setSelected(null)} />
    </Card>
  );
}

function TenantDetailModal({ tenant, onClose }) {
  if (!tenant) return null;
  const room = ROOMS.find(r => r.id === tenant.room) || {};
  const invoices = INVOICES.filter(i => i.room === tenant.room);
  const unpaid = invoices.filter(i => i.status !== 'paid');

  const handleContract = () => openContractWindow({
    name: tenant.name, idCard: tenant.idCard || '', phone: tenant.phone || '',
    room: tenant.room, type: tenant.type, rent: room.rent || tenant.deposit,
    deposit: tenant.deposit, checkIn: tenant.checkIn,
    contractMonths: null, bookingStatus: 'occupied',
    bookingFee: 0, bookingUntil: '', paymentMethod: 'cash',
  });

  return (
    <Modal open={!!tenant} onClose={onClose} title={`${tenant.name} — ห้อง ${tenant.room}`} width={560}
      footer={<>
        <Button variant="secondary" icon={I.download} onClick={handleContract}>สร้างสัญญาเช่า</Button>
        <div style={{ flex: 1 }} />
        <Button variant="secondary" onClick={onClose}>ปิด</Button>
      </>}>
      <div style={{ display: 'flex', gap: 14, alignItems: 'center', padding: '12px 16px', background: 'var(--surface-2)', borderRadius: 12, marginBottom: 20 }}>
        <Avatar name={tenant.name} size={44} />
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 15 }}>{tenant.name}</div>
          <div className="tu-muted" style={{ fontSize: 12, marginTop: 2 }}>{tenant.id} • {tenant.phone}</div>
        </div>
        <Badge tone={STATUS_META[tenant.status]?.tone} dot>{STATUS_META[tenant.status]?.th}</Badge>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
        <div>
          <SectionTitle>ข้อมูลการเช่า</SectionTitle>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <KV label="ห้อง" value={`${tenant.room} (ชั้น ${room.floor || '—'})`} />
            <KV label="ประเภท" value={tenant.type === 'monthly' ? 'รายเดือน' : 'รายวัน'} />
            <KV label="ค่าเช่า" value={`฿${(room.rent || 0).toLocaleString()} / ${tenant.type === 'monthly' ? 'เดือน' : 'คืน'}`} />
            <KV label="เงินมัดจำ" value={`฿${(tenant.deposit || 0).toLocaleString()}`} />
            <KV label="วันเข้าพัก" value={formatDate(tenant.checkIn)} />
            {tenant.checkOut && <KV label="สิ้นสุดสัญญา" value={formatDate(tenant.checkOut)} />}
          </div>
        </div>
        {unpaid.length > 0 && (
          <div>
            <SectionTitle>ใบแจ้งหนี้ค้างชำระ ({unpaid.length} รายการ)</SectionTitle>
            {unpaid.slice(0, 3).map(inv => (
              <div key={inv.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'var(--surface-2)', borderRadius: 8, marginBottom: 6 }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{inv.id}</div>
                  <div className="tu-muted" style={{ fontSize: 12 }}>{inv.period} • ครบกำหนด {formatDate(inv.dueDate)}</div>
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: inv.status === 'overdue' ? '#b13e3e' : 'var(--text)' }}>฿{(inv.total || 0).toLocaleString()}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </Modal>
  );
}

function TenantRegister({ onDone }) {
  const today = new Date().toISOString().slice(0, 10);
  const blankForm = () => ({
    type: 'monthly', name: '', idCard: '', phone: '', email: '',
    room: '', rent: 4000, checkIn: today, checkOut: '', deposit: 5000, notes: '',
    bookingStatus: 'occupied', bookingFee: 0, bookingUntil: '',
    bookingDays: 7,
    contractMonths: 1,
    paymentMethod: RATE_CONFIG.paymentMethods[0]?.id || 'cash',
  });
  const [form, setForm] = React.useState(blankForm);
  const [step, setStep] = React.useState(1);
  const [submitted, setSubmitted] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [saveError, setSaveError] = React.useState(null);
  const [showRateSettings, setShowRateSettings] = React.useState(false);
  const [, forceRender] = React.useReducer(x => x + 1, 0);
  const [isTemp, setIsTemp] = React.useState(false);

  const upd = (k, v) => setForm(p => {
    const next = { ...p, [k]: v };
    if (k === 'type') {
      const def = RATE_CONFIG.presets.find(pr => pr.type === v) || (v === 'monthly' ? { rent: 4000, deposit: 5000 } : { rent: 500, deposit: 200 });
      next.rent = def.rent; next.deposit = def.deposit; next.room = '';
    }
    if (k === 'room' && v) { const r = ROOMS.find(rm => rm.id === v); if (r) next.rent = r.rent; }
    return next;
  });

  const applyPreset = (p) => setForm(f => ({ ...f, rent: p.rent, deposit: p.deposit }));

  const handleSubmit = async () => {
    if (!window.sb) { setSubmitted(true); return; }
    setSaving(true); setSaveError(null);
    const roomStatus = form.bookingStatus === 'booked' ? 'booked' : 'occupied';
    const pmLabel = RATE_CONFIG.paymentMethods.find(p => p.id === form.paymentMethod)?.label || form.paymentMethod;
    const noteParts = [isTemp ? 'ผู้เช่าชั่วคราว (walk-in)' : null, form.notes, !isTemp ? `ชำระผ่าน: ${pmLabel}` : null, !isTemp && form.bookingStatus === 'booked' && Number(form.bookingFee) > 0 ? `ค่าจอง: ฿${Number(form.bookingFee).toLocaleString()}` : null].filter(Boolean);
    const addMonths = (dateStr, n) => { const d = new Date(dateStr); d.setMonth(d.getMonth() + n); return d.toISOString().slice(0,10); };
    const bookingUntil = !isTemp && form.bookingStatus === 'booked' ? (() => { const d = new Date(); d.setDate(d.getDate() + Number(form.bookingDays || 7)); return d.toISOString().slice(0,10); })() : null;
    const checkOut = isTemp
      ? (form.checkOut || null)
      : (form.type === 'monthly' && form.contractMonths ? addMonths(form.checkIn, form.contractMonths) : null);
    try {
      const { count } = await window.sb.from('tenants').select('*', { count: 'exact', head: true });
      const newId = 'T' + String((count || 0) + 1).padStart(4, '0');
      const insertData = {
        id: newId, name: form.name, phone: form.phone,
        ...(!isTemp && form.idCard ? { id_card: form.idCard } : {}),
        room_id: form.room, type: form.type, check_in: form.checkIn,
        ...(checkOut ? { check_out: checkOut } : {}),
        deposit: Number(form.deposit), status: isTemp ? 'occupied' : roomStatus,
      };
      const noteText = noteParts.join(' | ') || null;
      // Try with notes first; if column missing, retry without
      let { error } = await window.sb.from('tenants').insert({ ...insertData, notes: noteText });
      if (error?.message?.includes('notes')) {
        ({ error } = await window.sb.from('tenants').insert(insertData));
      }
      if (error) throw error;
      await window.sb.from('rooms').update({ status: isTemp ? 'occupied' : roomStatus, rent: Number(form.rent) }).eq('id', form.room);
      if (window.TU?.refreshData) await window.TU.refreshData();
      if (bookingUntil) setForm(f => ({ ...f, bookingUntil }));
      setSubmitted(true);
    } catch (e) {
      setSaveError(e.message || 'เกิดข้อผิดพลาด');
    } finally {
      setSaving(false);
    }
  };

  const availableRooms = ROOMS.filter(r => r.type === form.type && r.status === 'vacant');
  const presets = RATE_CONFIG.presets.filter(p => p.type === form.type);

  if (submitted) {
    return (
      <Card padding={48} style={{ textAlign: 'center' }}>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--primary-soft)',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: 'var(--primary)', marginBottom: 16 }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m5 12 5 5L20 7" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ fontSize: 18, fontWeight: 600 }}>
          {form.bookingStatus === 'booked' ? 'จองห้องสำเร็จ' : 'ลงทะเบียนสำเร็จ'}

        <div className="tu-muted" style={{ fontSize: 13, marginTop: 6 }}>
          คุณ{form.name || 'ผู้เข้าพัก'} • ห้อง {form.room || '—'} • ค่าเช่า ฿{Number(form.rent).toLocaleString()}
        </div>
        <div style={{ marginTop: 24, display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
          {!isTemp && <Button variant="secondary" onClick={() => openContractWindow(form)} icon={I.download}>สร้างสัญญาเช่า</Button>}
          <Button variant="secondary" onClick={() => { setSubmitted(false); setStep(1); setForm(blankForm()); }}>ลงทะเบียนคนใหม่</Button>
          <Button onClick={onDone}>ไปทะเบียนผู้เข้าพัก</Button>
        </div>
      </Card>
    );
  }

        {[{ v: false, t: 'เข้าพักปกติ' }, { v: true, t: 'ผู้เช่าชั่วคราว (walk-in)' }].map(o => (
          <button key={String(o.v)} onClick={() => { setIsTemp(o.v); setStep(1); setForm(blankForm()); }} style={{
            padding: '8px 20px', fontSize: 13, fontFamily: 'inherit', cursor: 'pointer', border: 0,

          }}>{o.t}</button>
        ))}
      </div>
      {isTemp && (
        <div style={{ marginBottom: 18, padding: '10px 14px', background: '#fef9c3', borderRadius: 10, border: '1px solid #fde047', fontSize: 12.5 }}>
          โหมดนี้สำหรับผู้เช่าชั่วคราว (walk-in) ไม่ต้องสมัครบัญชี — admin ผูกชื่อ-เบอร์โทรได้เลย
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', gap: 32 }}>
        {/* Steps sidebar */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 14 }}>ขั้นตอน</div>
          {(isTemp ? ['ห้องและราคา', 'ข้อมูลผู้เช่าชั่วคราว'] : ['ห้องและราคา', 'ข้อมูล & ชำระเงิน', 'ยืนยันและบันทึก']).map((s, i) => (
            <div key={i} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', marginBottom: 16 }}>

                width: 26, height: 26, borderRadius: '50%',
                background: step > i + 1 ? 'var(--primary)' : step === i + 1 ? 'var(--primary)' : 'var(--surface-2)',
                color: step >= i + 1 ? '#fff' : 'var(--muted)',

                <Input label="เลขบัตรประชาชน" value={form.idCard} onChange={v => upd('idCard', v)} placeholder="1-2345-67890-12-3" />
                <Input label="เบอร์โทร" value={form.phone} onChange={v => upd('phone', v)} placeholder="081-234-5678" />
                <Input label="อีเมล" value={form.email} onChange={v => upd('email', v)} placeholder="email@example.com" />
                <Input label="วันที่เข้าพัก" type="date" value={form.checkIn} onChange={v => upd('checkIn', v)} />
              </div>
              <Input label="หมายเหตุ" value={form.notes} onChange={v => upd('notes', v)} placeholder="ข้อมูลเพิ่มเติม" rows={2} />

              {/* Payment method */}
              <div>
                <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, color: 'var(--muted)' }}>วิธีชำระเงิน</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  {RATE_CONFIG.paymentMethods.map(pm => (
                    <button key={pm.id} onClick={() => upd('paymentMethod', pm.id)} style={{
                      display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderRadius: 10,
                      fontFamily: 'inherit', cursor: 'pointer', textAlign: 'left', transition: 'all .15s',
                      border: form.paymentMethod === pm.id ? '2px solid var(--primary)' : '1px solid var(--border)',
                      background: form.paymentMethod === pm.id ? 'var(--primary-soft)' : 'var(--surface)',
                    }}>
                      <div style={{ width: 18, height: 18, borderRadius: '50%', border: `2px solid ${form.paymentMethod === pm.id ? 'var(--primary)' : 'var(--border)'}`, background: form.paymentMethod === pm.id ? 'var(--primary)' : 'transparent', flexShrink: 0 }} />
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: form.paymentMethod === pm.id ? 'var(--primary)' : 'var(--text)' }}>{pm.label}</div>
                        {pm.detail && <div className="tu-muted" style={{ fontSize: 12 }}>{pm.detail}</div>}

          {/* ── Step 3: Summary + confirm (normal mode only) ── */}
          {step === 3 && !isTemp && (
            <div>

                    <KV label="ค่าจอง" value={`฿${Number(form.bookingFee).toLocaleString()}`} />

        </div>
      </div>
      <RateSettingsModal open={showRateSettings} onClose={() => { setShowRateSettings(false); forceRender(); }} />
    </Card>
  );
}

// ─── Pending tenant approvals ────────────────────────────────────────────
function AdminPendingTenants({ onApproved }) {
  const [pending, setPending] = React.useState(null);
  const [rejected, setRejected] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const [rejectTarget, setRejectTarget] = React.useState(null);
  const [showLog, setShowLog] = React.useState(false);

  const load = React.useCallback(async () => {
    if (!window.sb) { setPending([]); return; }
    const [{ data: pend }, rejResult] = await Promise.all([
      window.sb.from('profiles').select('*').eq('role', 'tenant').is('room_id', null).order('created_at'),
      window.sb.from('profiles').select('*').eq('role', 'rejected').order('rejected_at', { ascending: false }).limit(50),
    ]);
    setPending(pend || []);
    // Fallback if rejected_at column doesn't exist yet
    if (rejResult.error) {
      const { data: rej2 } = await window.sb.from('profiles').select('*').eq('role', 'rejected').limit(50);
      setRejected(rej2 || []);
    } else {
      setRejected(rejResult.data || []);
    }
  }, []);

  const [rejectError, setRejectError] = React.useState('');

  React.useEffect(() => { load(); }, []);

  const doReject = async (profile) => {
    setRejectError('');
    const now = new Date().toISOString();
    // Use .select('id') so Supabase returns the updated row — empty array means RLS blocked it
    let { data, error } = await window.sb.from('profiles')
      .update({ role: 'rejected', rejected_at: now })
      .eq('id', profile.id)
      .select('id');
    if (error) {
      // Fallback: try without rejected_at if column missing
      ({ data, error } = await window.sb.from('profiles')
        .update({ role: 'rejected' })
        .eq('id', profile.id)
        .select('id'));
    }
    if (error) {
      setRejectError('เกิดข้อผิดพลาด: ' + error.message);
      setRejectTarget(null);
      return;
    }
    if (!data || data.length === 0) {
      setRejectError('ไม่มีสิทธิ์ปฏิเสธ — กรุณาเพิ่ม RLS policy ใน Supabase ก่อน (ดูคำแนะนำด้านบน)');
      setRejectTarget(null);
      return;
    }
    setPending(p => p.filter(x => x.id !== profile.id));
    setRejected(r => [{ ...profile, role: 'rejected', rejected_at: now }, ...r]);
    if (onApproved) onApproved();
    setRejectTarget(null);
  };

  if (pending === null) return <Card padding={32} style={{ textAlign: 'center' }}><div className="tu-muted">กำลังโหลด...</div></Card>;
  if (!window.sb) return <Card padding={32} style={{ textAlign: 'center' }}><div className="tu-muted" style={{ fontSize: 13 }}>ฟีเจอร์นี้ใช้งานได้เมื่อเชื่อมต่อ Supabase แล้วเท่านั้น</div></Card>;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {rejectError && (
        <div style={{ padding: '12px 16px', background: '#fee2e2', borderRadius: 10, border: '1px solid #fca5a5', fontSize: 13 }}>
          <div style={{ fontWeight: 600, color: '#991b1b', marginBottom: 4 }}>ปฏิเสธไม่สำเร็จ</div>
          <div style={{ color: '#7f1d1d' }}>{rejectError}</div>
          <div style={{ marginTop: 8, fontSize: 12, color: '#9b1c1c' }}>
            แก้ไข: รัน SQL นี้ใน Supabase SQL Editor →
            <code style={{ display: 'block', marginTop: 4, padding: '6px 8px', background: '#fee2e2', borderRadius: 6, fontFamily: 'monospace', whiteSpace: 'pre-wrap' }}>
{`alter table profiles add column if not exists rejected_at timestamptz;

create policy "Admin can update any profile"
  on profiles for update
  using (is_admin()) with check (is_admin());`}
            </code>
          </div>
        </div>
      )}
      {/* Toggle rejection log */}
      <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
        <button onClick={() => setShowLog(v => !v)} style={{
          fontSize: 12.5, color: 'var(--muted)', background: 'var(--surface-2)',
          border: '1px solid var(--border)', borderRadius: 8, padding: '5px 12px', cursor: 'pointer', fontFamily: 'inherit',
        }}>
          {showLog ? '▲ ซ่อนประวัติปฏิเสธ' : `▼ ดูประวัติปฏิเสธ (${rejected.length} รายการ)`}
        </button>
      </div>

      {pending.length === 0 && !showLog && (
        <Card padding={48} style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>✅</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>ไม่มีผู้ลงทะเบียนรอการอนุมัติ</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 6 }}>เมื่อผู้เข้าพักสมัครผ่านหน้าเว็บ จะปรากฏที่นี่</div>
        </Card>
      )}

      {/* Pending approvals */}
      {pending.map(p => (
        <Card key={p.id} padding={16}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <Avatar name={p.full_name || p.email || '?'} size={44} />
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600, fontSize: 15 }}>{p.full_name || '(ไม่ระบุชื่อ)'}</div>
              <div className="tu-muted" style={{ fontSize: 12.5 }}>{p.email || '—'}</div>
              {p.phone && <div className="tu-muted" style={{ fontSize: 12 }}>{p.phone}</div>}
              <div className="tu-muted" style={{ fontSize: 11.5, marginTop: 4 }}>
                ลงทะเบียนเมื่อ {new Date(p.created_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' })}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <Button size="sm" onClick={() => setSelected(p)}>อนุมัติ & ผูกห้อง</Button>
              <Button size="sm" variant="secondary" onClick={() => setRejectTarget(p)}>ปฏิเสธ</Button>
            </div>
          </div>
        </Card>
      ))}

      {/* Rejection log */}
      {showLog && (
        <Card padding={0}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', fontWeight: 600, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ color: '#b13e3e' }}>✕</span> ประวัติการปฏิเสธ ({rejected.length} รายการ)
          </div>
          {rejected.length === 0
            ? <div style={{ padding: 24, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>ยังไม่มีประวัติการปฏิเสธ</div>
            : <table className="tu-table">
                <thead><tr><th>ชื่อ</th><th>อีเมล</th><th>โทร</th><th>ปฏิเสธเมื่อ</th></tr></thead>
                <tbody>
                  {rejected.map(r => (
                    <tr key={r.id}>
                      <td style={{ fontWeight: 500 }}>{r.full_name || '(ไม่ระบุ)'}</td>
                      <td className="tu-muted" style={{ fontSize: 12 }}>{r.email || '—'}</td>
                      <td className="tu-muted" style={{ fontSize: 12 }}>{r.phone || '—'}</td>
                      <td className="tu-muted" style={{ fontSize: 12 }}>
                        {r.rejected_at ? new Date(r.rejected_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </Card>
      )}

      <ApproveModal profile={selected} onClose={() => setSelected(null)}
        onDone={() => { setPending(p => p.filter(x => x.id !== selected?.id)); setSelected(null); if (onApproved) onApproved(); }} />
      <RejectModal profile={rejectTarget} onClose={() => setRejectTarget(null)} onConfirm={() => doReject(rejectTarget)} />
    </div>
  );
}

function ApproveModal({ profile, onClose, onDone }) {
  const today = new Date().toISOString().slice(0, 10);
  const defForm = () => { const d = RATE_CONFIG.presets.find(p => p.type === 'monthly') || { rent: 4000, deposit: 5000 }; return { type: 'monthly', room: '', rent: d.rent, checkIn: today, deposit: d.deposit, paymentMethod: RATE_CONFIG.paymentMethods[0]?.id || 'cash' }; };
  const [form, setForm] = React.useState(defForm);
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState(null);
  const upd = (k, v) => setForm(p => {
    const next = { ...p, [k]: v };
    if (k === 'type') { const d = RATE_CONFIG.presets.find(pr => pr.type === v) || (v === 'monthly' ? { rent: 4000, deposit: 5000 } : { rent: 500, deposit: 200 }); next.rent = d.rent; next.deposit = d.deposit; next.room = ''; }
    if (k === 'room' && v) { const r = ROOMS.find(rm => rm.id === v); if (r) next.rent = r.rent; }
    return next;
  });

  React.useEffect(() => { if (profile) setForm(defForm()); }, [profile?.id]);

  if (!profile) return null;

  const availableRooms = ROOMS.filter(r => r.type === form.type && r.status === 'vacant');

  const handleApprove = async () => {
    if (!form.room) return;
    setSaving(true); setError(null);
    const pmLabel = RATE_CONFIG.paymentMethods.find(p => p.id === form.paymentMethod)?.label || form.paymentMethod;
    try {
      const { count } = await window.sb.from('tenants').select('*', { count: 'exact', head: true });
      const newId = 'T' + String((count || 0) + 1).padStart(4, '0');
      const { error: e1 } = await window.sb.from('tenants').insert({
        id: newId, name: profile.full_name || '(ไม่ระบุชื่อ)',
        room_id: form.room, type: form.type, check_in: form.checkIn,
        deposit: Number(form.deposit), status: 'occupied', profile_id: profile.id,
        notes: `ชำระผ่าน: ${pmLabel}`,
      });
      if (e1) throw e1;
      await Promise.all([
        window.sb.from('rooms').update({ status: 'occupied', rent: Number(form.rent) }).eq('id', form.room),
        window.sb.from('profiles').update({ room_id: form.room }).eq('id', profile.id),
      ]);
      if (window.TU?.refreshData) await window.TU.refreshData();
      if (profile.email) {
        await emailjs.send(EJ_SERVICE, EJ_APPROVE, {
          to_email: profile.email, to_name: profile.full_name || 'ผู้เข้าพัก',
          room_number: form.room, room_type: form.type === 'monthly' ? 'รายเดือน' : 'รายวัน',
          check_in_date: new Date(form.checkIn).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' }),
          site_url: window.location.origin,
        });
      }
      onDone();
    } catch (e) {
      setError(e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
    } finally {
      setSaving(false);
    }
  };

  return (
    <Modal open={!!profile} onClose={onClose} title={`อนุมัติ — ${profile.full_name || profile.email}`} width={540}
      footer={<>
        <Button variant="secondary" onClick={onClose} disabled={saving}>ยกเลิก</Button>
        <Button onClick={handleApprove} disabled={!form.room || saving} icon={saving ? null : I.check}>
          {saving ? 'กำลังบันทึก...' : 'อนุมัติ & ผูกห้อง'}
        </Button>
      </>}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: 'var(--surface-2)', borderRadius: 12, marginBottom: 20 }}>
        <Avatar name={profile.full_name || profile.email || '?'} size={40} />
        <div>
          <div style={{ fontWeight: 600 }}>{profile.full_name || '(ไม่ระบุชื่อ)'}</div>
          <div className="tu-muted" style={{ fontSize: 12 }}>{profile.email} {profile.phone ? `• ${profile.phone}` : ''}</div>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        {/* Type */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, color: 'var(--muted)' }}>ประเภทการเช่า</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[{ v: 'monthly', t: 'รายเดือน' }, { v: 'daily', t: 'รายวัน' }].map(o => {
              const defPr = RATE_CONFIG.presets.find(p => p.type === o.v);
              return (
                <button key={o.v} onClick={() => upd('type', o.v)} style={{
                  textAlign: 'left', padding: '10px 14px', borderRadius: 10, fontFamily: 'inherit', cursor: 'pointer',
                  border: form.type === o.v ? '2px solid var(--primary)' : '1px solid var(--border)',
                  background: form.type === o.v ? 'var(--primary-soft)' : 'var(--surface)',
                }}>
                  <div style={{ fontSize: 13.5, fontWeight: 600, color: form.type === o.v ? 'var(--primary)' : 'var(--text)' }}>{o.t}</div>
                  <div className="tu-muted" style={{ fontSize: 11.5, marginTop: 2 }}>{defPr ? `฿${defPr.rent.toLocaleString()} • มัดจำ ฿${defPr.deposit.toLocaleString()}` : '—'}</div>
                </button>
              );
            })}
          </div>
        </div>
        {/* Room */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, color: 'var(--muted)' }}>เลือกห้องว่าง ({availableRooms.length} ห้อง)</div>
          {availableRooms.length === 0
            ? <div style={{ padding: '12px 14px', borderRadius: 10, background: '#fcd2d2', color: '#9b1c1c', fontSize: 13 }}>ไม่มีห้องว่างประเภท{form.type === 'monthly' ? 'รายเดือน' : 'รายวัน'}</div>
            : <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8 }}>
                {availableRooms.map(r => (
                  <button key={r.id} onClick={() => upd('room', r.id)} style={{
                    padding: '10px 4px', borderRadius: 8, fontFamily: 'inherit', cursor: 'pointer',
                    border: form.room === r.id ? '2px solid var(--primary)' : '1px solid var(--border)',
                    background: form.room === r.id ? 'var(--primary)' : 'var(--surface)',
                    color: form.room === r.id ? '#fff' : 'var(--text)',
                  }}>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{r.id}</div>
                    <div style={{ fontSize: 10, opacity: .75, marginTop: 2 }}>฿{r.rent.toLocaleString()}</div>
                  </button>
                ))}
              </div>
          }
        </div>
        {/* Rent + deposit + date */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
          <Input label="ค่าเช่า" prefix="฿" value={form.rent} onChange={v => upd('rent', v)} />
          <Input label="เงินมัดจำ" prefix="฿" value={form.deposit} onChange={v => upd('deposit', v)} />
          <Input label="วันที่เข้าพัก" type="date" value={form.checkIn} onChange={v => upd('checkIn', v)} />
        </div>
        {/* Payment method */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8, color: 'var(--muted)' }}>วิธีชำระเงิน</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {RATE_CONFIG.paymentMethods.map(pm => (
              <button key={pm.id} onClick={() => upd('paymentMethod', pm.id)} style={{
                padding: '7px 14px', borderRadius: 20, fontSize: 12.5, fontFamily: 'inherit', cursor: 'pointer', transition: 'all .12s',
                border: form.paymentMethod === pm.id ? '2px solid var(--primary)' : '1px solid var(--border)',
                background: form.paymentMethod === pm.id ? 'var(--primary)' : 'var(--surface)',
                color: form.paymentMethod === pm.id ? '#fff' : 'var(--text)',
                fontWeight: form.paymentMethod === pm.id ? 600 : 400,
              }}>{pm.label}{pm.detail ? ` — ${pm.detail}` : ''}</button>
            ))}
          </div>
        </div>
        {error && <div style={{ padding: '10px 14px', borderRadius: 10, background: '#fcd2d2', color: '#9b1c1c', fontSize: 13 }}>{error}</div>}
      </div>
    </Modal>
  );
}

function RejectModal({ profile, onClose, onConfirm }) {

}

function mapCashTxRow(row) {

    occurredAt: row.occurred_at,

    roomId: row.room_id || '—',
    category: row.category,

    paymentMethod: row.payment_method,
    recordedBy: row.recorded_by || '—',
  };

// Records a real cash in/out event (key deposit, booking deposit, rent
// settlement, refund, ...). amount > 0 = received, amount < 0 = paid out.
// "recorded_by" is whoever is currently signed in — the receipt signature.
async function recordCashTransaction({ tenantId, roomId, category, description, amount, paymentMethod }) {
  if (!window.sb || !amount) return;
  const user = window.TU?.currentUser;
  try {
    await window.sb.from('cash_transactions').insert({
      tenant_id: tenantId || null,
      room_id: roomId || null,
      category,
      description,
      amount,
      payment_method: paymentMethod || null,
      recorded_by: user?.name || user?.email || null,
      recorded_by_id: user?.id || null,
    });
  } catch (e) {
    console.error('recordCashTransaction failed', e);
  }
}

      <InvoiceModal invoice={selected} onClose={() => setSelected(null)} onPaid={(inv) => {

      }} />
    </div>
  );
}

// ─── Meter reading (จดมิเตอร์น้ำ-ไฟ) ────────────────────────────────────
function MeterReading() {
  const { METER_READINGS, UTILITY_RATE, ROOMS } = window.TUMP_DATA;
  const [readings, setReadings] = React.useState(() => METER_READINGS.map(m => ({
    ...m,
    water: { ...m.water },
    electric: { ...m.electric },
    rentShare: 'full', // 'full' | 'half'
  })));
  const [savedRoom, setSavedRoom] = React.useState(null);

  const rentOf = (room) => ROOMS.find(r => r.id === room)?.rent || 4000;
  const rentAmount = (m) => Math.round(rentOf(m.room) * (m.rentShare === 'half' ? 0.5 : 1));

  const setCurr = (room, kind, val) => {
    const num = val === '' ? null : Number(val);
    setReadings(p => p.map(r => r.room === room ? { ...r, [kind]: { ...r[kind], curr: num } } : r));
  };
  const setRentShare = (room, share) => {
    setReadings(p => p.map(r => r.room === room ? { ...r, rentShare: share } : r));
  };
  const saveRow = (room) => {
    setReadings(p => p.map(r => r.room === room
      ? { ...r, recorded: true, readDate: '2026-05-26' }
      : r));
    setSavedRoom(room);
    setTimeout(() => setSavedRoom(null), 1800);
  };

  const recordedCount = readings.filter(r => r.recorded).length;
  const pendingCount = readings.length - recordedCount;
  const units = (m, k) => (m[k].curr != null && m[k].prev != null) ? Math.max(0, m[k].curr - m[k].prev) : null;
  const utilityCost = (m) => {
    const w = units(m, 'water'); const e = units(m, 'electric');
    return (w != null ? w * UTILITY_RATE.water : 0) + (e != null ? e * UTILITY_RATE.electric : 0);
  };
  const rowCost = (m) => rentAmount(m) + utilityCost(m);
  const totalUnitsWater = readings.reduce((s, m) => s + (units(m, 'water') || 0), 0);
  const totalUnitsElec = readings.reduce((s, m) => s + (units(m, 'electric') || 0), 0);
  const totalBill = readings.reduce((s, m) => s + rowCost(m), 0);
  const halfCount = readings.filter(m => m.rentShare === 'half').length;

  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        <Stat label="จดมิเตอร์แล้ว" value={`${recordedCount}/${readings.length}`} sub="ห้องรายเดือน" tone="primary" icon={I.check} />
        <Stat label="ยังไม่จด" value={pendingCount} sub="รอบันทึกเดือนนี้" icon={I.bell} />
        <Stat label="หน่วยน้ำ-ไฟรวม" value={`${totalUnitsWater}/${totalUnitsElec}`} sub={`น้ำ ฿${UTILITY_RATE.water} • ไฟ ฿${UTILITY_RATE.electric} ต่อหน่วย`} icon={I.assets} />
        <Stat label="ยอดรวมทั้งหอ" value={`฿${totalBill.toLocaleString()}`} sub={`ค่าเช่า+น้ำ+ไฟ • ครึ่งเดือน ${halfCount} ห้อง`} icon={I.billing} />
      </div>

      <Card padding={0} style={{ marginTop: 16 }}>
        <div style={{ display: 'flex', padding: 16, borderBottom: '1px solid var(--border)', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontSize: 15, fontWeight: 600 }}>บันทึกเลขมิเตอร์ประจำเดือน (เฉพาะห้องรายเดือน)</div>
            <div className="tu-muted" style={{ fontSize: 12, marginTop: 2 }}>กรอกเลขมิเตอร์ครั้งนี้ ระบบคำนวณหน่วย × อัตรา • เลือกค่าเช่าเต็ม/ครึ่งเดือนกรณีเข้าพักไม่เต็มเดือน</div>
          </div>
          <Badge tone="neutral">งวด พฤษภาคม 2569</Badge>
        </div>
        <div style={{ overflowX: 'auto' }}>
        <table className="tu-table" style={{ minWidth: 880 }}>
          <thead>
            <tr>
              <th rowSpan={2} style={{ verticalAlign: 'bottom' }}>ห้อง / ผู้เช่า</th>
              <th rowSpan={2} style={{ verticalAlign: 'bottom', borderLeft: '1px solid var(--border)' }}>ค่าเช่าห้อง</th>
              <th colSpan={3} style={{ textAlign: 'center', borderLeft: '1px solid var(--border)' }}>น้ำประปา (฿{UTILITY_RATE.water}/หน่วย)</th>
              <th colSpan={3} style={{ textAlign: 'center', borderLeft: '1px solid var(--border)' }}>ไฟฟ้า (฿{UTILITY_RATE.electric}/หน่วย)</th>
              <th rowSpan={2} style={{ verticalAlign: 'bottom', textAlign: 'right', borderLeft: '1px solid var(--border)' }}>รวม</th>
              <th rowSpan={2} style={{ verticalAlign: 'bottom' }}></th>
            </tr>
            <tr>
              <th style={{ textAlign: 'right', borderLeft: '1px solid var(--border)', fontSize: 10.5 }}>ครั้งก่อน</th>
              <th style={{ textAlign: 'center', fontSize: 10.5 }}>ครั้งนี้</th>
              <th style={{ textAlign: 'right', fontSize: 10.5 }}>หน่วย</th>
              <th style={{ textAlign: 'right', borderLeft: '1px solid var(--border)', fontSize: 10.5 }}>ครั้งก่อน</th>
              <th style={{ textAlign: 'center', fontSize: 10.5 }}>ครั้งนี้</th>
              <th style={{ textAlign: 'right', fontSize: 10.5 }}>หน่วย</th>
            </tr>
          </thead>
          <tbody>
            {readings.map(m => {
              const wu = units(m, 'water'); const eu = units(m, 'electric');
              return (
                <tr key={m.room}>
                  <td>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <Badge tone="neutral">{m.room}</Badge>
                      <span style={{ fontSize: 12.5 }}>{m.tenant}</span>
                    </div>
                  </td>
                  {/* Rent with proration toggle */}
                  <td style={{ borderLeft: '1px solid var(--border)' }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      <div style={{ display: 'inline-flex', borderRadius: 7, overflow: 'hidden', border: '1px solid var(--border)', width: 'fit-content' }}>
                        {[{ v: 'full', t: 'เต็ม' }, { v: 'half', t: 'ครึ่ง' }].map(o => (
                          <button key={o.v} onClick={() => setRentShare(m.room, o.v)} style={{
                            padding: '3px 10px', fontSize: 11.5, fontFamily: 'inherit', border: 0, cursor: 'pointer',
                            background: m.rentShare === o.v ? 'var(--primary)' : 'var(--surface)',
                            color: m.rentShare === o.v ? '#fff' : 'var(--muted)', fontWeight: 500,
                          }}>{o.t}</button>
                        ))}
                      </div>
                      <span style={{ fontSize: 12.5, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>฿{rentAmount(m).toLocaleString()}</span>
                    </div>
                  </td>
                  {/* Water */}
                  <td style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums', borderLeft: '1px solid var(--border)' }} className="tu-muted">{m.water.prev}</td>
                  <td style={{ textAlign: 'center' }}>
                    <input type="number" value={m.water.curr ?? ''} onChange={(e) => setCurr(m.room, 'water', e.target.value)}
                      style={meterInputStyle(wu != null && wu < 0)} placeholder="—" />
                  </td>
                  <td style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums', fontWeight: 600, color: wu != null ? 'var(--text)' : 'var(--muted)' }}>{wu != null ? wu : '—'}</td>
                  {/* Electric */}
                  <td style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums', borderLeft: '1px solid var(--border)' }} className="tu-muted">{m.electric.prev}</td>
                  <td style={{ textAlign: 'center' }}>
                    <input type="number" value={m.electric.curr ?? ''} onChange={(e) => setCurr(m.room, 'electric', e.target.value)}
                      style={meterInputStyle(eu != null && eu < 0)} placeholder="—" />
                  </td>
                  <td style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums', fontWeight: 600, color: eu != null ? 'var(--text)' : 'var(--muted)' }}>{eu != null ? eu : '—'}</td>
                  {/* Total */}
                  <td style={{ textAlign: 'right', fontVariantNumeric: 'tabular-nums', fontWeight: 600, borderLeft: '1px solid var(--border)' }}>฿{rowCost(m).toLocaleString()}</td>
                  <td>
                    {savedRoom === m.room
                      ? <Badge tone="green" dot>บันทึกแล้ว</Badge>
                      : (wu != null && eu != null)
                        ? <button className="tu-link" onClick={() => saveRow(m.room)}>{m.recorded ? 'อัปเดต' : 'บันทึก'}</button>
                        : <span className="tu-muted" style={{ fontSize: 11.5 }}>รอกรอก</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ borderTop: '2px solid var(--text)' }}>
              <td style={{ padding: '14px 16px', fontWeight: 600 }}>รวมทั้งหมด</td>
              <td style={{ borderLeft: '1px solid var(--border)' }}></td>
              <td colSpan={2} style={{ borderLeft: '1px solid var(--border)' }}></td>
              <td style={{ textAlign: 'right', fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>{totalUnitsWater}</td>
              <td colSpan={2} style={{ borderLeft: '1px solid var(--border)' }}></td>
              <td style={{ textAlign: 'right', fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>{totalUnitsElec}</td>
              <td style={{ textAlign: 'right', fontWeight: 700, fontVariantNumeric: 'tabular-nums', borderLeft: '1px solid var(--border)' }}>฿{totalBill.toLocaleString()}</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
        </div>
        <div style={{ padding: 16, borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          <span className="tu-muted" style={{ fontSize: 12.5 }}>ยอดรวม = ค่าเช่าห้อง (เต็ม/ครึ่งเดือน) + ค่าน้ำ + ค่าไฟ — เมื่อจดครบแล้วออกใบแจ้งหนี้ได้ทันที</span>
          <Button size="sm" icon={I.billing} disabled={pendingCount > 0}>ออกใบแจ้งหนี้ทั้งหมด ({recordedCount})</Button>
        </div>
      </Card>
    </div>
  );
}

function meterInputStyle(error) {
