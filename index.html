  };
}

function InvoiceModal({ invoice, onClose, onPaid }) {
  const [paying, setPaying] = React.useState(false);
  const [method, setMethod] = React.useState('qr');
  const [saving, setSaving] = React.useState(false);
  React.useEffect(() => { setPaying(false); }, [invoice?.id]);
  if (!invoice) return null;
  const isPaid = invoice.status === 'paid';

  const confirmPaid = async () => {
    setSaving(true);
    const now = new Date().toISOString().slice(0, 10);
    const paymentMethod = { qr: 'QR PromptPay', bank: 'โอนธนาคาร', cash: 'เงินสด' }[method];
    if (window.sb) {
      await window.sb.from('invoices').update({ status: 'paid', paid_at: now, payment_method: paymentMethod }).eq('id', invoice.id);
      await recordCashTransaction({
        tenantId: invoice.tenantId, roomId: invoice.room, category: 'invoice_payment',
        description: `ชำระใบแจ้งหนี้ ${invoice.id} — ${invoice.tenantName} ห้อง ${invoice.room}`,
        amount: invoice.total, paymentMethod,
      });
    }
    invoice.status = 'paid';
    invoice.paidAt = now;
    invoice.paymentMethod = paymentMethod;
    setSaving(false);
    onPaid(invoice);
  };

  return (
    <Modal open={!!invoice} onClose={onClose}
      title={isPaid ? `ใบแจ้งหนี้ / ใบเสร็จ ${invoice.id}` : `ใบแจ้งหนี้ ${invoice.id}`}
      width={640}
      footer={isPaid ? (
        <>
          <Button variant="secondary" onClick={onClose}>ปิด</Button>
          <Button icon={I.print} onClick={() => openInvoiceWindow(invoice)}>พิมพ์ / PDF</Button>
        </>
      ) : (
        <>
          <Button variant="secondary" onClick={onClose}>ปิด</Button>
          <Button variant="secondary" icon={I.print} onClick={() => openInvoiceWindow(invoice)}>พิมพ์ใบแจ้งหนี้</Button>
          <Button onClick={() => setPaying(true)}>รับชำระเงิน →</Button>
        </>
      )}
    >
      {paying ? (
        <div>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>เลือกช่องทางการรับชำระ</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginBottom: 18 }}>
            {[
              { v: 'qr', t: 'QR PromptPay', s: 'สแกนจ่ายทันที' },
              { v: 'bank', t: 'โอนธนาคาร', s: 'หลักฐานการโอน' },
              { v: 'cash', t: 'เงินสด', s: 'รับที่ออฟฟิศ' },
            ].map(o => (
              <button key={o.v} onClick={() => setMethod(o.v)} style={{
                padding: 16, borderRadius: 12, fontFamily: 'inherit', textAlign: 'left',
                border: method === o.v ? '2px solid var(--primary)' : '1px solid var(--border)',
                background: method === o.v ? 'var(--primary-soft)' : 'var(--surface)',
                cursor: 'pointer', transition: 'all .15s',
              }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{o.t}</div>
                <div className="tu-muted" style={{ fontSize: 11.5, marginTop: 2 }}>{o.s}</div>
              </button>
            ))}
          </div>
          <div style={{ padding: 16, background: 'var(--surface-2)', borderRadius: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div className="tu-muted" style={{ fontSize: 12 }}>ยอดที่รับชำระ</div>
              <div style={{ fontSize: 22, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>฿{invoice.total.toLocaleString()}</div>
            </div>
            <Button onClick={confirmPaid} disabled={saving} icon={I.check}>{saving ? 'กำลังบันทึก...' : 'ยืนยันรับชำระ'}</Button>
          </div>
        </div>
      ) : (
        <div>
          <InvoiceBody invoice={invoice} />
          {/* Receipt section — shown inline when paid */}
          {isPaid && (
            <div style={{ marginTop: 16, padding: '16px 20px', background: 'rgba(22,101,52,.06)', borderRadius: 10, border: '1.5px solid rgba(22,101,52,.25)' }}>
              <div style={{ fontSize: 13.5, fontWeight: 700, color: 'var(--primary)', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}>
                {I.check} ใบเสร็จรับเงิน — ชำระเรียบร้อยแล้ว
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, fontSize: 13 }}>
                <div><div className="tu-muted" style={{ fontSize: 11 }}>วันที่ชำระ</div><div style={{ fontWeight: 600, marginTop: 2 }}>{formatDate(invoice.paidAt)}</div></div>
                <div><div className="tu-muted" style={{ fontSize: 11 }}>ช่องทาง</div><div style={{ fontWeight: 600, marginTop: 2 }}>{invoice.paymentMethod}</div></div>
                <div><div className="tu-muted" style={{ fontSize: 11 }}>ยอดที่รับ</div><div style={{ fontWeight: 600, marginTop: 2 }}>฿{invoice.total.toLocaleString()}</div></div>
                <div><div className="tu-muted" style={{ fontSize: 11 }}>เลขที่ใบเสร็จ</div><div style={{ fontWeight: 600, marginTop: 2, fontFamily: 'monospace' }}>{invoice.id}</div></div>
              </div>
            </div>
          )}
        </div>
      )}
    </Modal>
  );
}

function ComposePromo({ draft, setDraft, onCancel, onSend }) {
  const upd = (k, v) => setDraft(p => ({ ...p, [k]: v }));
  const toggleCh = (c) => setDraft(p => ({ ...p, channels: p.channels.includes(c) ? p.channels.filter(x => x !== c) : [...p.channels, c] }));
  return (
    <div>
      <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 14 }}>สร้างโปรโมชั่นใหม่</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Input label="หัวข้อ" value={draft.title} onChange={(v) => upd('title', v)} placeholder="ส่วนลดค่าเช่าเดือนแรก 10%" />
        <Input label="รายละเอียด" rows={4} value={draft.body} onChange={(v) => upd('body', v)} placeholder="เขียนข้อความที่จะส่งถึงผู้ติดตาม" />
        <div>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 6 }}>ภาพปก</div>
          <div style={{ display: 'flex', gap: 8 }}>
            {['green','lime','forest','sage'].map(c => (
              <button key={c} onClick={() => upd('cover', c)} style={{
                width: 56, height: 36, borderRadius: 8, border: draft.cover === c ? '2px solid var(--text)' : '1px solid var(--border)', cursor: 'pointer',
                background: ({
                  green: 'linear-gradient(135deg, #166534, #22a857)',
                  lime: 'linear-gradient(135deg, #65A30D, #a3e635)',
                  forest: 'linear-gradient(135deg, #14532d, #4d7c0f)',
                  sage: 'linear-gradient(135deg, #84a98c, #cad2c5)',
                })[c],
              }} />
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 6 }}>ส่งผ่านช่องทาง</div>
          <div style={{ display: 'flex', gap: 8 }}>
            {['line','fb','web'].map(c => {
              const active = draft.channels.includes(c);
              const meta = { line: { n: 'LINE', bg: '#06c755' }, fb: { n: 'Facebook', bg: '#1877f2' }, web: { n: 'หน้าเว็บ', bg: 'var(--text)' } }[c];
              return (
                <button key={c} onClick={() => toggleCh(c)} style={{
                  padding: '8px 14px', borderRadius: 999, cursor: 'pointer', fontFamily: 'inherit', fontSize: 12.5, fontWeight: 500,
                  border: active ? `2px solid ${meta.bg}` : '1px solid var(--border)',
                  background: active ? meta.bg : 'var(--surface)',
                  color: active ? '#fff' : 'var(--text)',
                  transition: 'all .15s',
                }}>{meta.n}</button>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 18, justifyContent: 'flex-end' }}>
        <Button variant="ghost" onClick={onCancel}>ยกเลิก</Button>
        <Button onClick={onSend} disabled={!draft.title} icon={I.line}>ส่งทันที</Button>
      </div>
    </div>
  );
}

function AdminAssets() {
  const { ASSETS, ASSET_META, ASSET_CONDITION } = window.TUMP_DATA;
  const [kindFilter, setKindFilter] = React.useState('all');
  const [query, setQuery] = React.useState('');
  const [selected, setSelected] = React.useState(null);

  // Flatten to per-item rows for the table view
  const allItems = ASSETS.flatMap(a => a.items.map(it => ({ ...it, room: a.room, type: a.type })));
  const filtered = allItems.filter(it => {
    if (kindFilter !== 'all' && it.kind !== kindFilter) return false;
    if (query && !(it.room.includes(query) || it.brand.toLowerCase().includes(query.toLowerCase()) || it.detail.toLowerCase().includes(query.toLowerCase()))) return false;
    return true;
  });

  const counts = {
    all: allItems.length,
    tv: allItems.filter(i => i.kind === 'tv').length,
    ac: allItems.filter(i => i.kind === 'ac').length,
    fridge: allItems.filter(i => i.kind === 'fridge').length,
    mattress: allItems.filter(i => i.kind === 'mattress').length,
  };
  const needRepair = allItems.filter(i => i.condition === 'repair').length;
  const needCheck = allItems.filter(i => i.condition === 'fair').length;

  const kindIcon = (k) => ({
    tv: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="5" width="20" height="13" rx="2"/><path d="M8 21h8M12 18v3"/></svg>,
    ac: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="9" rx="2"/><path d="M6 9h12M6 17c0-1.5 1-2 2-2M12 18c0-1.5 1-2.5 2.5-2.5M17 17c0-1 .5-1.5 1.5-1.5"/></svg>,
    fridge: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M5 10h14M9 5v2M9 13v3"/></svg>,
    mattress: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="10" rx="3"/><path d="M6 7v10M18 7v10"/></svg>,
  })[k];

  return (
    <div className="tu-page">
      <PageHeader title="ทรัพย์สินในห้อง" subtitle="Room Assets — ทะเบียนเครื่องใช้ไฟฟ้าและของในห้อง 101–409"
        actions={<>
          <Button variant="secondary" size="sm" icon={I.download}>ส่งออกทะเบียน</Button>
          <Button size="sm" icon={I.plus}>เพิ่มทรัพย์สิน</Button>
        </>}
      />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        <Stat label="ทรัพย์สินทั้งหมด" value={counts.all} sub={`${ASSETS.length} ห้อง × 4 รายการ`} tone="primary" icon={kindIcon('tv')} />
        <Stat label="พร้อมใช้งาน" value={counts.all - needRepair - needCheck} sub="สภาพดี" icon={I.check} />
        <Stat label="ควรตรวจเช็ก" value={needCheck} sub="เริ่มมีปัญหา" icon={I.bell} />

      </div>

      <Card padding={0} style={{ marginTop: 16 }}>
        <div style={{ display: 'flex', gap: 12, padding: 16, borderBottom: '1px solid var(--border)', alignItems: 'center', flexWrap: 'wrap' }}>
          <Tabs value={kindFilter} onChange={setKindFilter} options={[
            { value: 'all', label: 'ทั้งหมด', count: counts.all },
            { value: 'tv', label: 'ทีวี', count: counts.tv },
            { value: 'ac', label: 'แอร์', count: counts.ac },
            { value: 'fridge', label: 'ตู้เย็น', count: counts.fridge },
            { value: 'mattress', label: 'ฟูก', count: counts.mattress },
          ]} />
          <div style={{ flex: 1 }} />
          <div style={{ width: 280 }}>
            <Input prefix={I.search} placeholder="ค้นหาห้อง, ยี่ห้อ, รุ่น..." value={query} onChange={setQuery} />
          </div>
        </div>
        <table className="tu-table">
          <thead>
            <tr><th>ห้อง</th><th>ประเภท</th><th>หมวด</th><th>ยี่ห้อ / รุ่น</th><th>ขนาด / สเปก</th><th>ปีที่ติดตั้ง</th><th>สภาพ</th><th></th></tr>
          </thead>
          <tbody>
            {filtered.slice(0, 80).map((it, i) => (
              <tr key={i} className="tu-row-hover" onClick={() => setSelected({ ...it })}>

            <span className="tu-muted" style={{ fontSize: 12.5 }}>แสดง 80 จาก {filtered.length} รายการ</span>
          </div>
        )}
      </Card>

      <AssetModal asset={selected} onClose={() => setSelected(null)} />
    </div>
  );
}

function AdminStock() {

  const [showOut, setShowOut] = React.useState(false);

  const totalValue = STOCK_ITEMS.reduce((s, i) => s + i.qty * i.cost, 0);
  const lowStock = STOCK_ITEMS.filter(i => i.qty <= i.reorder);
  const monthOutCost = STOCK_OUT.reduce((s, w) => s + w.items.reduce((a, it) => a + it.qty * it.cost, 0), 0);
  const monthInCost = STOCK_IN.reduce((s, p) => s + p.items.reduce((a, it) => a + it.qty * it.cost, 0), 0);

  return (
    <div className="tu-page">
      <PageHeader title="คลังอุปกรณ์ซ่อม" subtitle="Stock — รับเข้า ตัดสต็อก เบิกไปซ่อม และต้นทุนการซ่อมแซม"

          <Button size="sm" icon={I.repairs} onClick={() => setShowOut(true)}>เบิกไปซ่อม</Button>
        </>}
      />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        <Stat label="มูลค่าคงคลัง" value={`฿${totalValue.toLocaleString()}`} sub={`${STOCK_ITEMS.length} รายการ`} tone="primary" icon={I.assets} />
        <Stat label="ต้นทุนรับเข้าเดือนนี้" value={`฿${monthInCost.toLocaleString()}`} sub={`${STOCK_IN.length} ใบสั่งซื้อ`} icon={I.download} />
        <Stat label="ต้นทุนเบิกซ่อมเดือนนี้" value={`฿${monthOutCost.toLocaleString()}`} sub={`${STOCK_OUT.length} ใบเบิก`} icon={I.repairs} />
        <Stat label="ใกล้หมด / ต้องสั่งเพิ่ม" value={lowStock.length} sub="ต่ำกว่าจุดสั่งซื้อ" icon={I.bell} />
      </div>

      <Card padding={0} style={{ marginTop: 16 }}>
        <div style={{ padding: 16, borderBottom: '1px solid var(--border)' }}>
          <Tabs value={tab} onChange={setTab} options={[
            { value: 'stock', label: 'คลังปัจจุบัน', count: STOCK_ITEMS.length },
            { value: 'in', label: 'ประวัติรับเข้า', count: STOCK_IN.length },
            { value: 'out', label: 'การเบิก / รายงานต้นทุน', count: STOCK_OUT.length },
          ]} />

        {tab === 'stock' && <StockTable items={STOCK_ITEMS} />}
        {tab === 'in' && <StockInList lots={STOCK_IN} />}

      <StockInModal open={showIn} onClose={() => setShowIn(false)} />
      <StockOutModal open={showOut} onClose={() => setShowOut(false)} />
    </div>
  );
}

function StockInModal({ open, onClose }) {
  const { STOCK_ITEMS } = window.TUMP_DATA;
  const [rows, setRows] = React.useState([{ sku: STOCK_ITEMS[0].sku, qty: 1, cost: STOCK_ITEMS[0].cost }]);
  const [done, setDone] = React.useState(false);
  React.useEffect(() => { if (!open) { setDone(false); setRows([{ sku: STOCK_ITEMS[0].sku, qty: 1, cost: STOCK_ITEMS[0].cost }]); } }, [open]);
  if (!open) return null;
  const total = rows.reduce((s, r) => s + Number(r.qty) * Number(r.cost), 0);
  const setRow = (i, k, v) => setRows(p => p.map((r, idx) => {
    if (idx !== i) return r;
    const nr = { ...r, [k]: v };
    if (k === 'sku') { const it = STOCK_ITEMS.find(x => x.sku === v); if (it) nr.cost = it.cost; }
    return nr;
  }));
  if (done) {
    return (
      <Modal open={open} onClose={onClose} title="รับเข้าสำเร็จ" width={460} footer={<Button onClick={onClose}>เสร็จสิ้น</Button>}>
        <div style={{ textAlign: 'center', padding: '20px 0' }}>
          <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'var(--primary-soft)', color: 'var(--primary)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}>{I.check}</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>เพิ่มสต็อกเรียบร้อย</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 6 }}>รับเข้า {rows.length} รายการ มูลค่ารวม ฿{total.toLocaleString()}</div>
        </div>
      </Modal>
    );
  }
  return (
    <Modal open={open} onClose={onClose} title="รับเข้าอุปกรณ์ (ซื้อเข้าสต็อก)" width={620}
      footer={<>
        <Button variant="secondary" onClick={onClose}>ยกเลิก</Button>
        <Button icon={I.check} onClick={() => setDone(true)}>บันทึกรับเข้า ฿{total.toLocaleString()}</Button>
      </>}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
        <Input label="ผู้จำหน่าย" value="ร้านวัสดุ ส.เจริญ" onChange={()=>{}} />
        <Input label="วันที่" type="date" value="2026-05-26" onChange={()=>{}} />
      </div>
      <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 8 }}>รายการที่รับเข้า</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {rows.map((r, i) => (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr 80px 110px 32px', gap: 8, alignItems: 'center' }}>
            <select className="tu-select" value={r.sku} onChange={(e) => setRow(i, 'sku', e.target.value)} style={{ width: '100%' }}>
              {STOCK_ITEMS.map(it => <option key={it.sku} value={it.sku}>{it.name}</option>)}
            </select>
            <Input value={r.qty} onChange={(v) => setRow(i, 'qty', v)} suffix="ชิ้น" />
            <Input prefix="฿" value={r.cost} onChange={(v) => setRow(i, 'cost', v)} />
            <button onClick={() => setRows(p => p.filter((_, idx) => idx !== i))} disabled={rows.length === 1}
              style={{ width: 32, height: 40, border: '1px solid var(--border)', borderRadius: 8, background: 'var(--surface)', cursor: rows.length === 1 ? 'not-allowed' : 'pointer', color: 'var(--muted)', opacity: rows.length === 1 ? .4 : 1 }}>✕</button>
          </div>
        ))}
      </div>
      <button className="tu-link" style={{ marginTop: 12 }} onClick={() => setRows(p => [...p, { sku: STOCK_ITEMS[0].sku, qty: 1, cost: STOCK_ITEMS[0].cost }])}>+ เพิ่มรายการ</button>
    </Modal>
  );
}

function Avatar({ name, size = 36 }) {
  const initial = (name || '?').replace(/^คุณ/, '').slice(0, 1);
  const colors = ['#166534', '#65A30D', '#84a98c', '#52796f', '#354f52'];
  const hash = (name || '').split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const bg = colors[hash % colors.length];
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: bg, color: '#fff',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.4, fontWeight: 600, flexShrink: 0 }}>{initial}</div>
  );
}

function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${(d.getFullYear() + 543).toString().slice(-2)}`;
}

function WorkOrderHistory({ orders, onSelect }) {
  const [scope, setScope] = React.useState('room');
  // Group by room (or common area), or by asset kind
  const groups = {};
  orders.forEach(o => {
    const key = scope === 'room'
      ? (o.location === 'common' ? `ส่วนกลาง · ${o.room}` : `ห้อง ${o.room}`)
      : window.TUMP_DATA.ASSET_META[o.assetKind]?.th || o.assetKind;
    (groups[key] = groups[key] || []).push(o);
  });

  const assetKindTh = (k) => ({ ac: 'แอร์', tv: 'ทีวี', fridge: 'ตู้เย็น', plumbing: 'ประปา/สุขภัณฑ์', electric: 'ไฟฟ้า', mattress: 'ฟูก', other: 'อื่นๆ' })[k] || k;
  // Re-group by asset name for asset scope for finer history
  const assetGroups = {};
  if (scope === 'asset') {
    orders.forEach(o => { (assetGroups[o.assetName] = assetGroups[o.assetName] || []).push(o); });
  }
  const display = scope === 'asset' ? assetGroups : groups;

  return (
    <div style={{ padding: 16 }}>
      <div style={{ marginBottom: 14 }}>
        <Tabs value={scope} onChange={setScope} options={[
          { value: 'room', label: 'ตามห้อง / ส่วนกลาง' },
          { value: 'asset', label: 'ตามสินทรัพย์' },
        ]} />
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {Object.entries(display).sort((a,b) => b[1].length - a[1].length).map(([key, list]) => {
          const total = list.reduce((s, o) => s + o.cost, 0);
          return (
            <div key={key} style={{ border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', background: 'var(--surface-2)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span style={{ fontSize: 13.5, fontWeight: 600 }}>{key}</span>
                  <Badge tone="neutral">{list.length} ครั้ง</Badge>
                </div>
                <span style={{ fontSize: 13.5, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>รวม ฿{total.toLocaleString()}</span>
              </div>
              <div>
                {list.map(o => (
                  <div key={o.id} className="tu-list-row tu-row-hover" style={{ padding: '10px 16px', cursor: 'pointer' }} onClick={() => onSelect(o)}>
                    <Badge tone={window.TUMP_DATA.WO_KIND[o.kind].tone} size="sm">{window.TUMP_DATA.WO_KIND[o.kind].th}</Badge>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, fontWeight: 500 }}>{o.title}</div>
                      <div className="tu-muted" style={{ fontSize: 11.5 }}>{o.vendor} • {formatDate(o.startDate)}</div>
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>฿{o.cost.toLocaleString()}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Cash receipts report — รายงานการรับเงิน (รายวัน / รายเดือน) จากสมุดบันทึกรายรับ-จ่ายจริงใน Supabase

function monthEndStr(ym) {
  const [y, m] = ym.split('-').map(Number);
  const d = new Date(y, m, 0); // day 0 of next month = last day of this month
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function AdminCashReport() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const thisMonthStr = todayStr.slice(0, 7);
  const [mode, setMode] = React.useState('daily');
  const [date, setDate] = React.useState(todayStr);
  const [month, setMonth] = React.useState(thisMonthStr);
  const [rangeFrom, setRangeFrom] = React.useState(todayStr);
  const [rangeTo, setRangeTo] = React.useState(todayStr);
  const [rows, setRows] = React.useState(null);

  const rangeStart = mode === 'daily' ? date : mode === 'range' ? rangeFrom : `${month}-01`;
  const rangeEnd = mode === 'daily' ? date : mode === 'range' ? rangeTo : monthEndStr(month);

  React.useEffect(() => {
    let active = true;
    setRows(null);
    (async () => {
      if (!window.sb) { if (active) setRows([]); return; }
      const { data } = await window.sb.from('cash_transactions').select('*')
        .gte('occurred_at', rangeStart).lte('occurred_at', rangeEnd + 'T23:59:59')
        .order('occurred_at', { ascending: true });
      if (active) setRows((data || []).map(mapCashTxRow));
    })();
    return () => { active = false; };
  }, [rangeStart, rangeEnd]);

  // Running balance (คงเหลือสะสม) — chronological, like the physical ledger book
  const chrono = rows || [];
  let bal = 0;
  const withBalance = chrono.map(r => { bal += r.amount; return { ...r, balance: bal }; });
  const list = [...withBalance].reverse(); // newest first for display

  const received = chrono.filter(r => r.amount > 0).reduce((s, r) => s + r.amount, 0);
  const paidOut = chrono.filter(r => r.amount < 0).reduce((s, r) => s + -r.amount, 0);
  const net = received - paidOut;
  const count = chrono.length;

  const byMethod = {};
  chrono.filter(r => r.amount > 0).forEach(r => { const k = r.paymentMethod || 'ไม่ระบุช่องทาง'; byMethod[k] = (byMethod[k] || 0) + r.amount; });
  const methodMax = Math.max(1, ...Object.values(byMethod), 0);
  const byCategory = {};
  chrono.forEach(r => { byCategory[r.categoryLabel] = (byCategory[r.categoryLabel] || 0) + r.amount; });
  const categoryMax = Math.max(1, ...Object.values(byCategory).map(Math.abs), 0);
  const byDay = {};
  chrono.forEach(r => { const d = (r.occurredAt || '').slice(0, 10); byDay[d] = (byDay[d] || 0) + r.amount; });
  const byDayEntries = Object.entries(byDay).sort((a, b) => a[0].localeCompare(b[0]));
  const dayMax = Math.max(1, ...Object.values(byDay).map(Math.abs), 0);

  const exportCSV = () => {

  // Today = 2026-06-02
  const today = '2026-06-02';
  const salesToday = SHOP_OUT.filter(s => s.date.startsWith(today));
  const revenueToday = salesToday.reduce((s, o) => s + o.items.reduce((a, it) => a + it.qty * it.price, 0), 0);

        <Stat label="ใกล้หมด / ต้องเติม" value={lowStock.length} sub={`มูลค่าสต็อก ฿${stockValue.toLocaleString()}`} icon={I.bell} />

function ShopSellModal({ open, onClose }) {
  const { SHOP_ITEMS } = window.TUMP_DATA;
  const [cart, setCart] = React.useState([]);
  const [done, setDone] = React.useState(false);
  React.useEffect(() => { if (!open) { setCart([]); setDone(false); } }, [open]);
  if (!open) return null;

  const inCart = (sku) => cart.find(c => c.sku === sku);
  const add = (item) => setCart(p => {
    const ex = p.find(c => c.sku === item.sku);
    if (ex) return p.map(c => c.sku === item.sku ? { ...c, qty: c.qty + 1 } : c);
    return [...p, { sku: item.sku, name: item.name, price: item.price, qty: 1 }];
  });
  const setQty = (sku, q) => setCart(p => q <= 0 ? p.filter(c => c.sku !== sku) : p.map(c => c.sku === sku ? { ...c, qty: q } : c));
  const total = cart.reduce((s, c) => s + c.qty * c.price, 0);

  if (done) {
    return (
      <Modal open={open} onClose={onClose} title="ขายสำเร็จ" width={420} footer={<Button onClick={onClose}>เสร็จสิ้น</Button>}>
        <div style={{ textAlign: 'center', padding: '20px 0' }}>
          <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'var(--primary-soft)', color: 'var(--primary)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}>{I.check}</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>บันทึกการขายเรียบร้อย</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 6 }}>ขาย {cart.length} รายการ • รวม ฿{total.toLocaleString()} (ตัดสต็อกแล้ว)</div>
        </div>
      </Modal>
    );
  }

  return (
    <Modal open={open} onClose={onClose} title="ขายสินค้า (POS)" width={680}
      footer={<>
        <Button variant="secondary" onClick={onClose}>ยกเลิก</Button>
        <Button icon={I.check} onClick={() => setDone(true)} disabled={cart.length === 0}>เก็บเงิน ฿{total.toLocaleString()}</Button>
      </>}>
      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16 }}>
        {/* Product grid */}
        <div>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 8 }}>เลือกสินค้า</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8, maxHeight: 320, overflowY: 'auto' }}>
            {SHOP_ITEMS.map(it => {
              const c = inCart(it.sku);
              const out = it.stock <= 0;
              return (
                <button key={it.sku} onClick={() => !out && add(it)} disabled={out} style={{
                  textAlign: 'left', padding: 10, borderRadius: 10, fontFamily: 'inherit', cursor: out ? 'not-allowed' : 'pointer',
                  border: c ? '2px solid var(--primary)' : '1px solid var(--border)',
                  background: c ? 'var(--primary-soft)' : 'var(--surface)', opacity: out ? .4 : 1, position: 'relative',
                }}>
                  <div style={{ fontSize: 12.5, fontWeight: 600, marginBottom: 2 }}>{it.name}</div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--primary)' }}>฿{it.price}</span>
                    <span className="tu-muted" style={{ fontSize: 10.5 }}>เหลือ {it.stock}</span>
                  </div>
                  {c && <span style={{ position: 'absolute', top: 6, right: 6, background: 'var(--primary)', color: '#fff', fontSize: 10, fontWeight: 700, width: 18, height: 18, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{c.qty}</span>}
                </button>
              );
            })}
          </div>
        </div>
        {/* Cart */}
        <div style={{ display: 'flex', flexDirection: 'column' }}>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 8 }}>ตะกร้า</div>
          <div style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 10, padding: cart.length ? 8 : 0, minHeight: 200, background: 'var(--surface-2)' }}>
            {cart.length === 0 ? (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 200, color: 'var(--muted)', fontSize: 13 }}>ยังไม่มีสินค้า</div>
            ) : cart.map(c => (
              <div key={c.sku} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px', background: 'var(--surface)', borderRadius: 8, marginBottom: 6 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12.5, fontWeight: 500 }}>{c.name}</div>
                  <div className="tu-muted" style={{ fontSize: 11 }}>฿{c.price} × {c.qty} = ฿{(c.price * c.qty).toLocaleString()}</div>

function ShopBuyModal({ open, onClose }) {

  React.useEffect(() => { if (!open) { setDone(false); setRows([{ sku: SHOP_ITEMS[0].sku, qty: 1, cost: SHOP_ITEMS[0].cost }]); } }, [open]);
  if (!open) return null;
  const total = rows.reduce((s, r) => s + Number(r.qty) * Number(r.cost), 0);
  const setRow = (i, k, v) => setRows(p => p.map((r, idx) => {
    if (idx !== i) return r;
    const nr = { ...r, [k]: v };
    if (k === 'sku') { const it = SHOP_ITEMS.find(x => x.sku === v); if (it) nr.cost = it.cost; }
    return nr;
  }));
  if (done) {
    return (
      <Modal open={open} onClose={onClose} title="ซื้อเข้าสำเร็จ" width={420} footer={<Button onClick={onClose}>เสร็จสิ้น</Button>}>

          <div className="tu-muted" style={{ fontSize: 13, marginTop: 6 }}>ซื้อเข้า {rows.length} รายการ มูลค่า ฿{total.toLocaleString()}</div>
        </div>
      </Modal>
    );
  }
  return (
    <Modal open={open} onClose={onClose} title="ซื้อสินค้าเข้าสต็อก" width={620}
      footer={<>
        <Button variant="secondary" onClick={onClose}>ยกเลิก</Button>
        <Button icon={I.check} onClick={() => setDone(true)}>บันทึกซื้อเข้า ฿{total.toLocaleString()}</Button>
      </>}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
        <Input label="ผู้จำหน่าย" value="แม็คโคร ขอนแก่น" onChange={()=>{}} />
        <Input label="วันที่" type="date" value="2026-06-02" onChange={()=>{}} />
      </div>
      <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 8 }}>รายการที่ซื้อเข้า</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {rows.map((r, i) => (
          <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr 80px 110px 32px', gap: 8, alignItems: 'center' }}>
            <select className="tu-select" value={r.sku} onChange={(e) => setRow(i, 'sku', e.target.value)} style={{ width: '100%' }}>
              {SHOP_ITEMS.map(it => <option key={it.sku} value={it.sku}>{it.name}</option>)}
            </select>
            <Input value={r.qty} onChange={(v) => setRow(i, 'qty', v)} suffix="ชิ้น" />
            <Input prefix="฿" value={r.cost} onChange={(v) => setRow(i, 'cost', v)} />
            <button onClick={() => setRows(p => p.filter((_, idx) => idx !== i))} disabled={rows.length === 1}
              style={{ width: 32, height: 40, border: '1px solid var(--border)', borderRadius: 8, background: 'var(--surface)', cursor: rows.length === 1 ? 'not-allowed' : 'pointer', color: 'var(--muted)', opacity: rows.length === 1 ? .4 : 1 }}>✕</button>
          </div>
        ))}
      </div>
      <button className="tu-link" style={{ marginTop: 12 }} onClick={() => setRows(p => [...p, { sku: SHOP_ITEMS[0].sku, qty: 1, cost: SHOP_ITEMS[0].cost }])}>+ เพิ่มรายการ</button>
    </Modal>
  );
}

function PortalPay({ invoice, onDone }) {
  const [done, setDone] = React.useState(false);
  React.useEffect(() => {
    if (done) return;
    const t = setTimeout(() => setDone(true), 2400);
    return () => clearTimeout(t);
  }, [done]);
  React.useEffect(() => {
    if (done) {
      const t = setTimeout(onDone, 1500);
      return () => clearTimeout(t);
    }
  }, [done]);

  if (done) {
    return (

// Tiny faux QR — random-looking but stable from a seed
function FakeQR() {
  const cells = [];
  const seed = 137;
  for (let y = 0; y < 21; y++) {
    for (let x = 0; x < 21; x++) {
      // 3 finder corners
      const corner = (x < 7 && y < 7) || (x > 13 && y < 7) || (x < 7 && y > 13);
      if (corner) {
        const cx = x < 7 ? 3 : 17, cy = y < 7 ? 3 : 17;
        const d = Math.max(Math.abs(x - cx), Math.abs(y - cy));
        if (d === 0 || d === 1 || d === 3) cells.push({ x, y });
      } else {
        if ((x * 7 + y * 13 + x * y * 3 + seed) % 5 < 2) cells.push({ x, y });
      }
    }
  }
  return (
    <svg viewBox="0 0 21 21" width="100%" height="100%">
      {cells.map((c, i) => <rect key={i} x={c.x} y={c.y} width={1} height={1} fill="#0c1f12" />)}
    </svg>
  );
}

      setAuthLoading(false);

    window.sb.auth.getSession().then(({ data }) => applySession(data.session));
    const { data: listener } = window.sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        if (active) { setRecoveryMode(true); setAuthLoading(false); }

async function createInvoiceInSB({ tenantId, roomId, tenantName, type, period, issueDate, dueDate, items }) {
  const total = Math.max(0, items.reduce((s, i) => s + i.amount, 0));
  const ym = issueDate.slice(0, 7).replace('-', '');
  const { count } = await window.sb.from('invoices').select('*', { count: 'exact', head: true });
  const invId = `INV-${ym}-${String((count || 0) + 1).padStart(3, '0')}`;

  // Try multiple column-name variants (Supabase table may differ)
  const variants = [
    { id: invId, tenant_id: tenantId, room_id: roomId, tenant_name: tenantName, type, period, issue_date: issueDate, due_date: dueDate, items, total, status: 'pending' },
    { id: invId, tenant_id: tenantId, room_id: roomId, tenant_name: tenantName, type, period, issue_date: issueDate, due_date: dueDate, notes: JSON.stringify(items), total, status: 'pending' },
    { id: invId, tenant_id: tenantId, room: roomId, tenant_name: tenantName, type, period, issue_date: issueDate, due_date: dueDate, notes: JSON.stringify(items), total, status: 'pending' },
    { id: invId, type, period, issue_date: issueDate, due_date: dueDate, notes: `${tenantName} | ${period} | ${JSON.stringify(items)}`, total, status: 'pending' },
  ];

  let lastErr = null;
  for (const v of variants) {
    const { error } = await window.sb.from('invoices').insert(v);
    if (!error) return { invId, total };
    lastErr = error;
    const m = error.message || '';
    // Only continue if it's a column/schema mismatch, not a permission/PK error
    if (!m.includes('column') && !m.includes('schema') && !m.includes("'items'") && !m.includes("'room_id'") && !m.includes("'room'") && !m.includes("'tenant_name'") && !m.includes("'tenant_id'")) break;
  }
  throw lastErr;
}

function CheckinModal({ tenant, onClose, onDone }) {
  const [depositPaid, setDepositPaid] = React.useState(true);
  const [collectKeyDeposit, setCollectKeyDeposit] = React.useState(true);
  const [keyDepositAmt, setKeyDepositAmt] = React.useState(Number(RATE_CONFIG.keyDeposit) || 0);
  const [skipReason, setSkipReason] = React.useState('');
  const [pm, setPm] = React.useState(RATE_CONFIG.paymentMethods[0]?.id || 'cash');
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const room = ROOMS.find(r => r.id === (tenant.room_id || tenant.room));
  const deposit = Number(tenant.deposit) || 0;
  const isMonthly = tenant.type === 'monthly';
  const rent = room?.rent || (isMonthly ? 4000 : 500);
  const today = new Date().toISOString().slice(0, 10);
  const dueD = new Date(); dueD.setDate(dueD.getDate() + 7);
  const thMonths = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const diffDays = (d1, d2) => {
    const p = s => { const [y,m,d] = s.slice(0,10).split('-').map(Number); return Date.UTC(y, m-1, d); };
    return Math.round((p(d2) - p(d1)) / 86400000);
  };
  const checkIn = (tenant.check_in || tenant.checkIn || today).slice(0, 10);
  const checkOutPlanned = (tenant.check_out || '').slice(0, 10);
  const plannedNights = !isMonthly && checkOutPlanned ? Math.max(1, diffDays(checkIn, checkOutPlanned)) : null;
  const period = isMonthly
    ? `${thMonths[new Date().getMonth()]} ${new Date().getFullYear() + 543}`
    : `${formatDate(checkIn)} – ${checkOutPlanned ? formatDate(checkOutPlanned) : '?'}`;
  const baseAmount = isMonthly ? rent : (plannedNights || 1) * rent;
  const baseLabel = isMonthly ? 'ค่าเช่า (เดือนแรก)' : `ค่าที่พักตามแผน ${plannedNights || 1} คืน (฿${rent.toLocaleString()}/คืน)`;
  const invoiceItems = [
    { label: baseLabel, qty: 1, unit: isMonthly ? 'เดือน' : 'รายการ', price: baseAmount, amount: baseAmount },
    ...(depositPaid && deposit > 0 ? [{ label: 'หักเงินมัดจำ', qty: 1, unit: 'ครั้ง', price: -deposit, amount: -deposit }] : []),
  ];
  const invoiceTotal = Math.max(0, invoiceItems.reduce((s, i) => s + i.amount, 0));

  const doConfirm = async () => {
    if (!collectKeyDeposit && !skipReason.trim()) { setErr('กรุณาระบุสาเหตุที่ไม่เก็บมัดจำกุญแจ'); return; }
    setBusy(true); setErr('');
    try {
      const pmLabel = RATE_CONFIG.paymentMethods.find(p => p.id === pm)?.label || pm;
      const noteParts = [
        depositPaid ? `ชำระมัดจำ ฿${deposit.toLocaleString()} ผ่าน${pmLabel}` : 'ยังไม่ชำระมัดจำ',
        collectKeyDeposit && keyDepositAmt > 0 ? `รับมัดจำกุญแจ ฿${keyDepositAmt.toLocaleString()}` : `ไม่เก็บมัดจำกุญแจ — เหตุผล: ${skipReason.trim()}`,
      ].filter(Boolean);
      const noteAdd = ' | ' + noteParts.join(' | ');
      if (window.sb) {
        const roomKey = tenant.room_id || tenant.room;
        await window.sb.from('tenants').update({
          status: 'occupied',
          notes: (tenant.notes || '') + noteAdd,
          key_deposit: collectKeyDeposit ? keyDepositAmt : 0,
        }).eq('id', tenant.id);
        await window.sb.from('rooms').update({ status: 'occupied' }).eq('id', roomKey);
        if (invoiceItems.length > 0) {
          await createInvoiceInSB({ tenantId: tenant.id, roomId: roomKey, tenantName: tenant.name, type: tenant.type, period, issueDate: today, dueDate: dueD.toISOString().slice(0, 10), items: invoiceItems });
        }
        // Booking deposit collected for the first time right here at check-in
        // (not already recorded when the booking was created).
        if (depositPaid && deposit > 0 && !tenant.notes?.includes('ชำระมัดจำ')) {
          await recordCashTransaction({
            tenantId: tenant.id, roomId: roomKey, category: 'booking_deposit',
            description: `รับมัดจำจอง — ${tenant.name} ห้อง ${roomKey}`,
            amount: deposit, paymentMethod: pmLabel,
          });
        }
        if (collectKeyDeposit && keyDepositAmt > 0) {
          await recordCashTransaction({
            tenantId: tenant.id, roomId: roomKey, category: 'key_deposit',
            description: `รับมัดจำกุญแจ — ${tenant.name} ห้อง ${roomKey}`,
            amount: keyDepositAmt, paymentMethod: pmLabel,
          });
        }
        if (window.TU?.refreshData) await window.TU.refreshData();
      }
      onDone();
    } catch (e) { setErr(e.message || 'เกิดข้อผิดพลาด'); setBusy(false); }
  };

  return (
    <Modal open onClose={onClose} title={`เช็คอิน — ห้อง ${tenant.room_id || tenant.room}`} width={480}
      footer={<><Button variant="secondary" onClick={onClose} disabled={busy}>ยกเลิก</Button><Button onClick={doConfirm} disabled={busy || (!collectKeyDeposit && !skipReason.trim())}>{busy ? 'กำลังบันทึก...' : 'ยืนยันเช็คอิน'}</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ padding: 14, background: 'var(--surface-2)', borderRadius: 10 }}>

        {deposit > 0 && (

          <div style={{ display: 'flex', gap: 8, marginBottom: collectKeyDeposit ? 8 : 0 }}>

              <button key={String(o.v)} onClick={() => setCollectKeyDeposit(o.v)} style={{
                flex: 1, padding: '10px 0', borderRadius: 8, border: `2px solid ${collectKeyDeposit === o.v ? 'var(--primary)' : 'var(--border)'}`,
                background: collectKeyDeposit === o.v ? 'var(--primary-soft)' : 'var(--surface)', cursor: 'pointer', fontFamily: 'inherit',
                fontSize: 13, color: collectKeyDeposit === o.v ? 'var(--primary)' : 'var(--text)',
              }}>{o.t}</button>
            ))}
          </div>
          {collectKeyDeposit ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span className="tu-muted" style={{ fontSize: 13 }}>฿</span>
              <input type="number" value={keyDepositAmt} onChange={e => setKeyDepositAmt(Number(e.target.value) || 0)}
                style={{ flex: 1, height: 38, border: '1px solid var(--border)', borderRadius: 8, padding: '0 10px', fontSize: 13, fontFamily: 'inherit', background: 'var(--surface)', color: 'var(--text)', outline: 'none' }} />

              <input value={skipReason} onChange={e => setSkipReason(e.target.value)} placeholder="เช่น ผู้เช่าเป็นลูกค้าประจำ / ลืมเอากุญแจสำรองมา"
                style={{ width: '100%', height: 38, border: `1px solid ${!skipReason.trim() ? '#fca5a5' : 'var(--border)'}`, borderRadius: 8, padding: '0 10px', fontSize: 13, fontFamily: 'inherit', background: 'var(--surface)', color: 'var(--text)', outline: 'none', boxSizing: 'border-box' }} />

        {invoiceItems.length > 0 && (
          <div>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8 }}>{isMonthly ? 'ใบแจ้งหนี้เดือนแรก (สร้างอัตโนมัติ)' : 'ใบแจ้งหนี้ส่วนที่เหลือ (สร้างอัตโนมัติ)'}</div>
            <div style={{ background: 'var(--surface-2)', borderRadius: 10, overflow: 'hidden' }}>
              {invoiceItems.map((item, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '9px 14px', borderBottom: i < invoiceItems.length - 1 ? '1px solid var(--border)' : 0, fontSize: 13 }}>
                  <span>{item.label}</span>
                  <span style={{ fontVariantNumeric: 'tabular-nums', color: item.amount < 0 ? '#b35a1f' : 'inherit' }}>{item.amount < 0 ? '−' : ''}฿{Math.abs(item.amount).toLocaleString()}</span>
                </div>
              ))}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '11px 14px', fontWeight: 600, fontSize: 14, background: 'var(--surface)' }}>
                <span>รวมที่ต้องชำระตอนนี้</span>
                <span style={{ color: 'var(--primary)' }}>฿{invoiceTotal.toLocaleString()}</span>
              </div>
            </div>
          </div>
        )}
        {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
      </div>
    </Modal>
  );
}

function DailyCheckoutModal({ tenant, onClose, onDone }) {
  const today = new Date().toISOString().slice(0, 10);
  const checkIn = (tenant.check_in || tenant.checkIn || today).slice(0, 10);
  // Default to the tenant's planned checkout date (e.g. after ต่อสัญญา) if it's later than today
  const plannedOut = tenant.check_out ? tenant.check_out.slice(0, 10) : null;
  const [checkoutDate, setCheckoutDate] = React.useState(plannedOut && plannedOut > today ? plannedOut : today);
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [invErr, setInvErr] = React.useState('');
  const [loadingLedger, setLoadingLedger] = React.useState(true);
  const [priorCollected, setPriorCollected] = React.useState(0); // sum of all invoices already issued to this tenant
  const [keyLost, setKeyLost] = React.useState(false);
  const room = ROOMS.find(r => r.id === (tenant.room_id || tenant.room));
  const rate = room?.rent || 500;
  const deposit = Number(tenant.deposit) || 0;
  const depositCollected = tenant.notes?.includes('ชำระมัดจำ') ? deposit : 0;
  const keyDeposit = Number(tenant.key_deposit) || 0;
  const [keyLostFee, setKeyLostFee] = React.useState(Number(RATE_CONFIG.keyDeposit) || 200);

  React.useEffect(() => {
    (async () => {
      if (!window.sb) { setLoadingLedger(false); return; }
      const { data } = await window.sb.from('invoices').select('total').eq('tenant_id', tenant.id);
      setPriorCollected((data || []).reduce((s, r) => s + (Number(r.total) || 0), 0));
      setLoadingLedger(false);
    })();
  }, [tenant.id]);

  const diffDays = (d1, d2) => {
    const p = s => { const [y,m,d] = s.slice(0,10).split('-').map(Number); return Date.UTC(y, m-1, d); };
    return Math.round((p(d2) - p(d1)) / 86400000);
  };
  const nights = Math.max(1, diffDays(checkIn, checkoutDate));
  const actualCost = nights * rate;
  const totalCollected = depositCollected + priorCollected; // already paid toward rent (booking deposit + check-in + extension invoices)
  const rentBalance = actualCost - totalCollected; // >0 still owes rent, <0 overpaid
  // Key returned: refund/apply the key deposit as usual.
  // Key lost: forfeit the key deposit (no refund); if no key deposit was ever collected, charge the loss fee instead.
  const keyLossCharge = keyLost ? (keyDeposit > 0 ? 0 : keyLostFee) : 0;
  const keyRefundCredit = keyLost ? 0 : keyDeposit;
  const netSettlement = rentBalance - keyRefundCredit + keyLossCharge;

  const items = [
    { label: `ค่าที่พักจริง ${nights} คืน (฿${rate.toLocaleString()}/คืน)`, amount: actualCost },
    ...(totalCollected > 0 ? [{ label: 'ชำระไปแล้ว (มัดจำจอง + ใบแจ้งหนี้ก่อนหน้า)', amount: -totalCollected }] : []),
    ...(!keyLost && keyDeposit > 0 ? [{ label: 'เงินมัดจำกุญแจ (คืนให้)', amount: -keyDeposit }] : []),
    ...(keyLost && keyDeposit > 0 ? [{ label: 'เงินมัดจำกุญแจ (ริบ — กุญแจหาย)', amount: 0 }] : []),
    ...(keyLost && keyDeposit === 0 ? [{ label: 'ค่าปรับกุญแจหาย (ไม่มีมัดจำกุญแจไว้)', amount: keyLostFee }] : []),
  ];
  const owes = Math.max(0, netSettlement);
  const refund = Math.max(0, -netSettlement);

  const doConfirm = async () => {
    setBusy(true); setErr(''); setInvErr('');
    try {
      const roomKey = tenant.room_id || tenant.room;
      if (window.sb) {
        if (owes > 0) {
          try {
            await createInvoiceInSB({
              tenantId: tenant.id, roomId: roomKey, tenantName: tenant.name, type: 'daily',
              period: `${formatDate(checkIn)} – ${formatDate(checkoutDate)}`, issueDate: today, dueDate: today,
              items: [{ label: `ส่วนที่ค้างชำระตอนเช็คเอ้าท์ (สุทธิหลังหักมัดจำกุญแจ)`, qty: 1, unit: 'รายการ', price: owes, amount: owes }],
            });
          } catch (invE) {
            setInvErr('ไม่สามารถออกใบแจ้งหนี้ได้: ' + (invE.message || invE));
          }
        }
        const keyNote = keyLost
          ? (keyDeposit > 0 ? ` | กุญแจหาย — ริบมัดจำกุญแจ ฿${keyDeposit.toLocaleString()}` : ` | กุญแจหาย — เก็บค่าปรับ ฿${keyLostFee.toLocaleString()} (ไม่มีมัดจำกุญแจ)`)
          : keyDeposit > 0 ? ` | คืนมัดจำกุญแจ ฿${keyDeposit.toLocaleString()}` : '';
        const refundNote = (refund > 0 ? ` | คืนเงิน ฿${refund.toLocaleString()} เมื่อเช็คเอ้าท์` : owes === 0 ? ' | ชำระครบถ้วนเมื่อเช็คเอ้าท์' : '') + keyNote;
        // Don't set status='checked_out' — room_status enum doesn't have that value
        // Setting check_out date is enough to remove from active lists
        const { error: upErr } = await window.sb.from('tenants').update({ check_out: checkoutDate, checked_out_at: new Date().toISOString(), notes: (tenant.notes || '') + refundNote, key_deposit: 0 }).eq('id', tenant.id);
        if (upErr) throw upErr;
        await window.sb.from('rooms').update({ status: 'cleaning' }).eq('id', roomKey);
        if (!keyLost && keyDeposit > 0) {
          await recordCashTransaction({
            tenantId: tenant.id, roomId: roomKey, category: 'key_deposit_refund',
            description: `คืนมัดจำกุญแจ — ${tenant.name} ห้อง ${roomKey}`,
            amount: -keyDeposit,
          });
        }
        if (keyLost && keyDeposit === 0 && keyLostFee > 0) {
          await recordCashTransaction({
            tenantId: tenant.id, roomId: roomKey, category: 'key_loss_fee',
            description: `ค่าปรับกุญแจหาย (ไม่มีมัดจำกุญแจไว้) — ${tenant.name} ห้อง ${roomKey}`,
            amount: keyLostFee,
          });
        }
        if (owes > 0) {
          await recordCashTransaction({
            tenantId: tenant.id, roomId: roomKey, category: 'rent_settlement',
            description: `เก็บส่วนต่างตอนเช็คเอ้าท์ — ${tenant.name} ห้อง ${roomKey}`,
            amount: owes,
          });
        }
        if (refund > 0) {
          await recordCashTransaction({
            tenantId: tenant.id, roomId: roomKey, category: 'refund',
            description: `คืนเงินผู้เช่าตอนเช็คเอ้าท์ — ${tenant.name} ห้อง ${roomKey}`,
            amount: -refund,
          });
        }
        if (window.TU?.refreshData) await window.TU.refreshData();
      }
      setBusy(false);
      onDone();
    } catch (e) { setErr(e.message || 'เกิดข้อผิดพลาด'); setBusy(false); }
  };

  return (
    <Modal open onClose={onClose} title={`เช็คเอ้าท์ — ห้อง ${tenant.room_id || tenant.room}`} width={440}
      footer={<><Button variant="secondary" onClick={onClose} disabled={busy}>ยกเลิก</Button><Button onClick={doConfirm} disabled={busy || loadingLedger}>{busy ? 'กำลังบันทึก...' : loadingLedger ? 'กำลังโหลด...' : refund > 0 ? `ยืนยัน + คืนเงิน ฿${refund.toLocaleString()}` : owes > 0 ? `ยืนยัน + เก็บเพิ่ม ฿${owes.toLocaleString()}` : 'ยืนยันเช็คเอ้าท์'}</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ padding: 14, background: 'var(--surface-2)', borderRadius: 10 }}>
          <div style={{ fontSize: 15, fontWeight: 600 }}>{tenant.name}</div>
          <div className="tu-muted" style={{ fontSize: 13 }}>เข้าพักตั้งแต่ {formatDate(checkIn)}</div>
        </div>
        <Input label="วันที่เช็คเอ้าท์" type="date" value={checkoutDate} onChange={setCheckoutDate} />

        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8 }}>
            สถานะกุญแจ {keyDeposit > 0 && <span className="tu-muted" style={{ fontWeight: 400 }}>(มัดจำไว้ ฿{keyDeposit.toLocaleString()})</span>}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            {[{v:false,t:'คืนกุญแจครบ'},{v:true,t:'กุญแจหาย'}].map(o => (
              <button key={String(o.v)} onClick={() => setKeyLost(o.v)} style={{
                flex: 1, padding: '10px 0', borderRadius: 8, border: `2px solid ${keyLost === o.v ? (o.v ? '#dc2626' : 'var(--primary)') : 'var(--border)'}`,
                background: keyLost === o.v ? (o.v ? 'rgba(220,38,38,.08)' : 'var(--primary-soft)') : 'var(--surface)', cursor: 'pointer', fontFamily: 'inherit',
                fontSize: 13, color: keyLost === o.v ? (o.v ? '#dc2626' : 'var(--primary)') : 'var(--text)',
              }}>{o.t}</button>
            ))}
          </div>
          {keyLost && keyDeposit === 0 && (
            <div style={{ marginTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
              <span className="tu-muted" style={{ fontSize: 12.5 }}>ไม่มีมัดจำกุญแจไว้ — ค่าปรับ ฿</span>
              <input type="number" value={keyLostFee} onChange={e => setKeyLostFee(Number(e.target.value) || 0)}
                style={{ width: 90, height: 32, border: '1px solid var(--border)', borderRadius: 8, padding: '0 8px', fontSize: 13, fontFamily: 'inherit', background: 'var(--surface)', color: 'var(--text)', outline: 'none' }} />
            </div>
          )}
        </div>

        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 8 }}>สรุปการชำระเงินทั้งหมด</div>
          {loadingLedger ? (
            <div style={{ padding: 14, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>กำลังตรวจสอบยอดที่ชำระไปแล้ว...</div>
          ) : (
            <div style={{ background: 'var(--surface-2)', borderRadius: 10, overflow: 'hidden' }}>
              {items.map((item, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '9px 14px', borderBottom: '1px solid var(--border)', fontSize: 13 }}>
                  <span>{item.label}</span>
                  <span style={{ fontVariantNumeric: 'tabular-nums', color: item.amount < 0 ? '#b35a1f' : 'inherit' }}>{item.amount < 0 ? '−' : ''}฿{Math.abs(item.amount).toLocaleString()}</span>
                </div>
              ))}
              <div style={{ display: 'flex', justifyContent: 'space-between', padding: '11px 14px', fontWeight: 600, fontSize: 14, background: 'var(--surface)' }}>
                <span>{refund > 0 ? 'ต้องคืนเงินให้ผู้เช่า' : 'ยอดที่ต้องเก็บเพิ่ม'}</span>
                <span style={{ color: refund > 0 ? '#16a34a' : 'var(--primary)' }}>฿{(refund > 0 ? refund : owes).toLocaleString()}</span>
              </div>
            </div>
          )}
        </div>
        {invErr && <div style={{ fontSize: 12, color: '#b45309', background: '#fef3c7', padding: '8px 12px', borderRadius: 8 }}>{invErr}</div>}
        {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
      </div>
    </Modal>
  );
}

function ExtendStayModal({ tenant, onClose, onDone }) {
  const today = new Date().toISOString().slice(0, 10);
  // Supabase may return datetime strings — take only date part
  const currentOut = (tenant.check_out || today).slice(0, 10);

  const addDays = (dateStr, n) => {
    const [y, m, d] = dateStr.slice(0, 10).split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d + n)).toISOString().slice(0, 10);
  };
  const diffDays = (d1, d2) => {
    const p = s => { const [y,m,d] = s.slice(0,10).split('-').map(Number); return Date.UTC(y, m-1, d); };
    return Math.round((p(d2) - p(d1)) / 86400000);
  };

  const minDate = addDays(currentOut, 1);
  const [newOut, setNewOut] = React.useState(minDate);
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [invErr, setInvErr] = React.useState('');

  const room = ROOMS.find(r => r.id === (tenant.room_id || tenant.room));
  const rate = room?.rent || 500;
  const extNights = Math.max(0, diffDays(currentOut, newOut));
  const extTotal = extNights * rate;

  const doConfirm = async () => {
    if (extNights < 1) { setErr('กรุณาเลือกวันออกหลัง ' + formatDate(currentOut)); return; }
    setBusy(true); setErr(''); setInvErr('');
    try {
      const roomKey = tenant.room_id || tenant.room;
      if (window.sb) {
        // Try invoice creation — log error but don't block checkout update
        try {
          const items = [{ label: `ต่อสัญญา ${extNights} คืน`, qty: extNights, unit: 'คืน', price: rate, amount: extTotal }];
          await createInvoiceInSB({
            tenantId: tenant.id, roomId: roomKey, tenantName: tenant.name, type: 'daily',
            period: `ต่อสัญญา ${formatDate(currentOut)} – ${formatDate(newOut)}`,
            issueDate: today, dueDate: today, items,
          });
        } catch (invE) {
          setInvErr('ไม่สามารถออกใบแจ้งหนี้ได้: ' + (invE.message || invE));
        }
        // Always update checkout date regardless of invoice result
        const { error: upErr } = await window.sb.from('tenants').update({ check_out: newOut }).eq('id', tenant.id);
        if (upErr) throw upErr;
      }
      setBusy(false);
      onDone();
    } catch (e) {
      setErr(e.message || 'เกิดข้อผิดพลาด');
      setBusy(false);
    }
  };

  return (
    <Modal open onClose={onClose} title="ต่อสัญญาเช่า" width={420}
      footer={<>
        <Button variant="secondary" onClick={onClose} disabled={busy}>ยกเลิก</Button>
        <Button onClick={doConfirm} disabled={busy || extNights < 1}>
          {busy ? 'กำลังบันทึก...' : extNights > 0 ? `ต่อสัญญา ${extNights} คืน — ฿${extTotal.toLocaleString()}` : 'เลือกวันออกให้ถูกต้อง'}
        </Button>
      </>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div style={{ padding: 12, background: 'var(--surface-2)', borderRadius: 10 }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>{tenant.name} — ห้อง {tenant.room_id || tenant.room}</div>
          <div className="tu-muted" style={{ fontSize: 12 }}>วันออกเดิม: {formatDate(currentOut)}</div>
        </div>

        <div>
          <div style={{ fontSize: 12.5, fontWeight: 500, color: 'var(--muted)', marginBottom: 6 }}>
            วันออกใหม่ <span style={{ color: '#dc2626', fontSize: 11 }}>(ต้องหลังวันออกเดิม)</span>
          </div>
          <input type="date" value={newOut} min={minDate}
            onChange={e => setNewOut(e.target.value)}
            style={{ width: '100%', height: 42, border: '1px solid var(--border)', borderRadius: 10, padding: '0 12px', fontSize: 14, fontFamily: 'inherit', background: 'var(--surface)', color: 'var(--text)', outline: 'none', boxSizing: 'border-box' }}
          />
        </div>

        {extNights > 0 ? (
          <div style={{ padding: 12, background: '#f0fdf4', borderRadius: 10, border: '1px solid #86efac', fontSize: 13 }}>
            <div>ต่อสัญญา <strong>{extNights} คืน</strong> × ฿{rate.toLocaleString()} = <strong style={{ color: 'var(--primary)' }}>฿{extTotal.toLocaleString()}</strong></div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>วันออกใหม่: {formatDate(newOut)}</div>
          </div>
        ) : (
          <div style={{ padding: 10, background: '#fef3c7', borderRadius: 10, border: '1px solid #fde68a', fontSize: 13, color: '#92400e' }}>
            กรุณาเลือกวันออกหลัง {formatDate(currentOut)}
          </div>
        )}
        {invErr && <div style={{ fontSize: 12, color: '#b45309', background: '#fef3c7', padding: '8px 12px', borderRadius: 8 }}>{invErr}</div>}
        {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
      </div>
    </Modal>
  );
}

function CreateBookingModal({ onClose, onDone }) {
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = React.useState({
    type: 'monthly', room: '', name: '', phone: '',
    checkIn: today, checkOut: '', months: 1,
    deposit: 5000, depositPaid: false,
    paymentMethod: RATE_CONFIG.paymentMethods[0]?.id || 'cash',
    notes: '',
  });
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');

  const upd = (k, v) => setForm(f => {
    const n = { ...f, [k]: v };
    if (k === 'type') {
      const def = RATE_CONFIG.presets.find(p => p.type === v);
      n.deposit = def?.deposit || (v === 'monthly' ? 5000 : 200); n.room = '';
    }
    return n;
  });

  const availRooms = ROOMS.filter(r => r.type === form.type && r.status === 'vacant');

  const doSave = async () => {
    if (!form.name.trim()) { setErr('กรุณากรอกชื่อ'); return; }
    if (!form.room) { setErr('กรุณาเลือกห้อง'); return; }
    setBusy(true); setErr('');
    try {
      const pmLabel = RATE_CONFIG.paymentMethods.find(p => p.id === form.paymentMethod)?.label || form.paymentMethod;
      const noteParts = [form.notes, form.depositPaid ? `ชำระมัดจำ ฿${Number(form.deposit).toLocaleString()} ผ่าน${pmLabel}` : 'ยังไม่ชำระมัดจำ'].filter(Boolean);
      if (window.sb) {
        const { count } = await window.sb.from('tenants').select('*', { count: 'exact', head: true });
        const newId = 'T' + String((count || 0) + 1).padStart(4, '0');
        const addMonths = (d, n) => { const x = new Date(d); x.setMonth(x.getMonth() + n); return x.toISOString().slice(0, 10); };
        const insertData = {
          id: newId, name: form.name.trim(), phone: form.phone.trim(),
          room_id: form.room, type: form.type, check_in: form.checkIn,
          ...(form.type === 'daily' && form.checkOut ? { check_out: form.checkOut } : {}),
          ...(form.type === 'monthly' && form.months ? { check_out: addMonths(form.checkIn, Number(form.months)) } : {}),
          deposit: Number(form.deposit), status: 'booked',
          notes: noteParts.join(' | ') || null,
        };
        let { error } = await window.sb.from('tenants').insert(insertData);
        if (error?.message?.includes('notes')) ({ error } = await window.sb.from('tenants').insert({ ...insertData, notes: undefined }));
        if (error) throw error;
        await window.sb.from('rooms').update({ status: 'booked' }).eq('id', form.room);
        if (form.depositPaid && Number(form.deposit) > 0) {
          await recordCashTransaction({
            tenantId: newId, roomId: form.room, category: 'booking_deposit',
            description: `รับมัดจำจอง — ${form.name.trim()} ห้อง ${form.room}`,
            amount: Number(form.deposit), paymentMethod: pmLabel,
          });
        }
        if (window.TU?.refreshData) await window.TU.refreshData();
      } else {
        const r = ROOMS.find(x => x.id === form.room);
        if (r) r.status = 'booked';
      }
      onDone();
    } catch (e) { setErr(e.message || 'เกิดข้อผิดพลาด'); setBusy(false); }
  };

  const btnStyle = (active) => ({
    textAlign: 'left', padding: '10px 14px', borderRadius: 10, fontFamily: 'inherit', cursor: 'pointer',
    border: active ? '2px solid var(--primary)' : '1px solid var(--border)',
    background: active ? 'var(--primary-soft)' : 'var(--surface)', transition: 'all .15s',
  });

  return (
    <Modal open onClose={onClose} title="สร้างการจองใหม่" width={520}
      footer={<><Button variant="secondary" onClick={onClose} disabled={busy}>ยกเลิก</Button><Button onClick={doSave} disabled={busy || !form.room || !form.name.trim()}>{busy ? 'กำลังบันทึก...' : 'บันทึกการจอง'}</Button></>}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>

        {/* Type */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {[{v:'monthly',t:'รายเดือน'},{v:'daily',t:'รายวัน'}].map(o => {
            const pr = RATE_CONFIG.presets.find(p => p.type === o.v);
            return (
              <button key={o.v} onClick={() => upd('type', o.v)} style={btnStyle(form.type === o.v)}>
                <div style={{ fontSize: 14, fontWeight: 600, color: form.type === o.v ? 'var(--primary)' : 'var(--text)' }}>{o.t}</div>
                <div className="tu-muted" style={{ fontSize: 12, marginTop: 2 }}>{pr ? `฿${pr.rent.toLocaleString()} | มัดจำ ฿${pr.deposit.toLocaleString()}` : '—'}</div>
              </button>
            );
          })}
        </div>

        {/* Room picker */}
        <div>
          <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6 }}>
            เลือกห้อง {availRooms.length === 0 && <span style={{ color: '#dc2626' }}>(ไม่มีห้องว่าง)</span>}
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {availRooms.map(r => (
              <button key={r.id} onClick={() => upd('room', r.id)} style={{
                padding: '6px 14px', borderRadius: 8, fontFamily: 'inherit', cursor: 'pointer', fontSize: 13,
                border: `2px solid ${form.room === r.id ? 'var(--primary)' : 'var(--border)'}`,
                background: form.room === r.id ? 'var(--primary-soft)' : 'var(--surface)',
                color: form.room === r.id ? 'var(--primary)' : 'var(--text)',
              }}>{r.id}</button>
            ))}
            {availRooms.length === 0 && <span style={{ fontSize: 13, color: 'var(--muted)' }}>ไม่มีห้องว่างประเภทนี้</span>}
          </div>
        </div>

        <Input label="ชื่อ-นามสกุล *" value={form.name} onChange={v => upd('name', v)} placeholder="ชื่อผู้จอง" />
        <Input label="เบอร์โทร" value={form.phone} onChange={v => upd('phone', v)} placeholder="081-xxx-xxxx" />

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Input label="วันเข้าพัก" type="date" value={form.checkIn} onChange={v => upd('checkIn', v)} />
          {form.type === 'daily' ? (
            <Input label="วันออก (รายวัน)" type="date" value={form.checkOut} onChange={v => upd('checkOut', v)} />
          ) : (
            <div>
              <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6 }}>จำนวนเดือน</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {[1,3,6,12].map(n => (
                  <button key={n} onClick={() => upd('months', n)} style={{
                    padding: '7px 12px', borderRadius: 8, fontFamily: 'inherit', cursor: 'pointer', fontSize: 13,
                    border: `2px solid ${form.months === n ? 'var(--primary)' : 'var(--border)'}`,
                    background: form.months === n ? 'var(--primary-soft)' : 'var(--surface)',
                    color: form.months === n ? 'var(--primary)' : 'var(--text)',
                  }}>{n}</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Deposit */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Input label="เงินมัดจำ (฿)" type="number" value={form.deposit} onChange={v => upd('deposit', v)} />
          <div>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6 }}>สถานะมัดจำ</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[{v:false,t:'ยังไม่ชำระ'},{v:true,t:'ชำระแล้ว'}].map(o => (
                <button key={String(o.v)} onClick={() => upd('depositPaid', o.v)} style={{
                  flex: 1, padding: '8px 0', borderRadius: 8, fontFamily: 'inherit', cursor: 'pointer', fontSize: 12,
                  border: `2px solid ${form.depositPaid === o.v ? 'var(--primary)' : 'var(--border)'}`,
                  background: form.depositPaid === o.v ? 'var(--primary-soft)' : 'var(--surface)',
                  color: form.depositPaid === o.v ? 'var(--primary)' : 'var(--text)',
                }}>{o.t}</button>
              ))}
            </div>
          </div>
        </div>

        {form.depositPaid && (
          <div>
            <div style={{ fontSize: 13, fontWeight: 500, marginBottom: 6 }}>วิธีชำระมัดจำ</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {RATE_CONFIG.paymentMethods.map(m => (
                <button key={m.id} onClick={() => upd('paymentMethod', m.id)} style={{
                  flex: 1, padding: '8px 0', borderRadius: 8, fontFamily: 'inherit', cursor: 'pointer', fontSize: 12,
                  border: `1.5px solid ${form.paymentMethod === m.id ? 'var(--primary)' : 'var(--border)'}`,
                  background: form.paymentMethod === m.id ? 'var(--primary-soft)' : 'var(--surface)',
                  color: form.paymentMethod === m.id ? 'var(--primary)' : 'var(--text)',
                }}>{m.label}</button>
              ))}
            </div>
          </div>
        )}

        <Input label="หมายเหตุ" value={form.notes} onChange={v => upd('notes', v)} placeholder="ข้อมูลเพิ่มเติม" rows={2} />
        {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
      </div>
    </Modal>
  );
}
