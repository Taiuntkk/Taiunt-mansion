function SignInForm({ onSubmit }) {
  const connected = !!window.sb;
  const [email, setEmail] = React.useState(connected ? '' : 'admin@taiunt.co');
  const [pw, setPw] = React.useState(connected ? '' : 'demo1234');
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [resetMode, setResetMode] = React.useState(false);
  const [resetSent, setResetSent] = React.useState(false);

  const doLogin = async () => {
    setBusy(true);
    setErr('');
    const { error } = await window.sb.auth.signInWithPassword({ email, password: pw });
    setBusy(false);
    if (error) setErr(error.message === 'Invalid login credentials' ? 'อีเมลหรือรหัสผ่านไม่ถูกต้อง' : error.message);
    // on success App's onAuthStateChange listener resolves the role and routes in
  };

  const doResetPassword = async () => {
    if (!email) { setErr('กรุณากรอกอีเมลก่อน'); return; }
    setBusy(true); setErr('');
    const { error } = await window.sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname,
    });
    setBusy(false);
    if (error) { setErr('ไม่สามารถส่งอีเมลได้: ' + error.message); return; }
    setResetSent(true);
    await notifyAdmin('ขอรีเซ็ตรหัสผ่าน', '(ผู้ใช้งาน)', email);
  };

  if (resetMode) {
    if (resetSent) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ textAlign: 'center', padding: '20px 0' }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📧</div>
            <div style={{ fontSize: 20, fontWeight: 700 }}>ส่งอีเมลแล้ว!</div>
            <div className="tu-muted" style={{ fontSize: 13, marginTop: 8, lineHeight: 1.6 }}>
              ระบบส่งลิงก์รีเซ็ตรหัสผ่านไปที่<br/>
              <strong>{email}</strong><br/>
              กรุณาตรวจสอบกล่องจดหมาย (และโฟลเดอร์ Spam)
            </div>
          </div>
          <div style={{ padding: 12, background: '#f0fdf4', borderRadius: 10, border: '1px solid #86efac', fontSize: 13, lineHeight: 1.6 }}>
            หลังจากคลิกลิงก์ในอีเมล ระบบจะพาคุณกลับมาหน้านี้เพื่อตั้งรหัสผ่านใหม่
          </div>
          <Button fullWidth variant="secondary" onClick={() => { setResetMode(false); setResetSent(false); }}>
            กลับหน้าเข้าสู่ระบบ
          </Button>
        </div>
      );
    }
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-.01em' }}>ลืมรหัสผ่าน</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 4 }}>
            กรอกอีเมลที่ลงทะเบียนไว้ ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่
          </div>
        </div>
        <Input label="อีเมล" value={email} onChange={setEmail} placeholder="you@example.com" />
        {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
        <Button fullWidth size="lg" onClick={doResetPassword} disabled={busy || !email}>
          {busy ? 'กำลังส่งอีเมล…' : 'ส่งลิงก์รีเซ็ตรหัสผ่าน'}
        </Button>
        <Button fullWidth variant="secondary" onClick={() => { setResetMode(false); setErr(''); }}>
          กลับหน้าเข้าสู่ระบบ
        </Button>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div>
        <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-.01em' }}>เข้าสู่ระบบ</div>
        <div className="tu-muted" style={{ fontSize: 13, marginTop: 4 }}>
          {connected ? 'ยินดีต้อนรับกลับ — กรอกอีเมลและรหัสผ่านของคุณ' : 'ยินดีต้อนรับกลับ — เลือกประเภทบัญชีของคุณ'}
        </div>
      </div>
      <Input label="อีเมล" value={email} onChange={setEmail} placeholder="you@example.com" />
      <Input label="รหัสผ่าน" type="password" value={pw} onChange={setPw} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 12.5 }}>
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
          <input type="checkbox" defaultChecked /> จดจำการเข้าสู่ระบบ
        </label>
        <a href="#" className="tu-link" onClick={e => { e.preventDefault(); setResetMode(true); setErr(''); }}>ลืมรหัสผ่าน?</a>
      </div>
      {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
      {connected ?
      <Button fullWidth size="lg" onClick={doLogin} disabled={busy || !email || !pw}>{busy ? 'กำลังเข้าสู่ระบบ…' : 'เข้าสู่ระบบ'}</Button> :
      <>
          <Button fullWidth size="lg" onClick={() => onSubmit('admin')}>เข้าสู่ระบบเป็น Admin</Button>
          <Button fullWidth size="lg" variant="secondary" onClick={() => onSubmit('customer')}>เข้าสู่ระบบเป็นผู้เข้าพัก</Button>
        </>}
      <div style={{ position: 'relative', textAlign: 'center', margin: '6px 0' }}>
        <div style={{ position: 'absolute', inset: '50% 0 auto', height: 1, background: 'var(--border)' }} />
        <span style={{ position: 'relative', background: 'var(--surface)', padding: '0 12px', fontSize: 11.5, color: 'var(--muted)' }}>หรือเข้าสู่ระบบด้วย</span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
        <Button variant="secondary" icon={<span style={{ color: '#06c755' }}>{I.line}</span>}>LINE</Button>
        <Button variant="secondary" icon={<span style={{ color: '#1877f2' }}>{I.fb}</span>}>Facebook</Button>
      </div>
    </div>);

}

function SetNewPasswordScreen({ onDone }) {
  const [pw, setPw] = React.useState('');
  const [pw2, setPw2] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const [err, setErr] = React.useState('');

  const doUpdate = async () => {
    if (pw.length < 8) { setErr('รหัสผ่านต้องมีอย่างน้อย 8 ตัวอักษร'); return; }
    if (pw !== pw2) { setErr('รหัสผ่านไม่ตรงกัน กรุณากรอกใหม่อีกครั้ง'); return; }
    setBusy(true); setErr('');
    const { error } = await window.sb.auth.updateUser({ password: pw });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setDone(true);
    setTimeout(onDone, 2500);
  };

  if (done) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)' }}>
        <div style={{ textAlign: 'center', padding: 40 }}>
          <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--primary-soft)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: 'var(--primary)', marginBottom: 16 }}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m5 12 5 5L20 7" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>ตั้งรหัสผ่านใหม่สำเร็จ</div>
          <div className="tu-muted" style={{ fontSize: 13 }}>กำลังนำคุณกลับเข้าสู่ระบบ...</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)', padding: 24 }}>
      <div style={{ width: '100%', maxWidth: 420, background: 'var(--surface)', borderRadius: 20, padding: 36, boxShadow: '0 4px 32px rgba(0,0,0,.10)' }}>
        <div style={{ marginBottom: 28 }}>
          <div style={{ fontSize: 22, fontWeight: 700 }}>ตั้งรหัสผ่านใหม่</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 6 }}>กรอกรหัสผ่านใหม่ที่ต้องการใช้งาน</div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="รหัสผ่านใหม่" type="password" value={pw} onChange={v => setPw(v)} hint="อย่างน้อย 8 ตัวอักษร" />
          <Input label="ยืนยันรหัสผ่าน" type="password" value={pw2} onChange={v => setPw2(v)} />
          {err && <div style={{ fontSize: 12.5, color: '#dc2626', padding: '8px 12px', background: '#fee2e2', borderRadius: 8 }}>{err}</div>}
          <Button fullWidth size="lg" onClick={doUpdate} disabled={busy || pw.length < 8}>
            {busy ? 'กำลังบันทึก...' : 'ยืนยันรหัสผ่านใหม่'}
          </Button>
        </div>
      </div>
    </div>
  );
}

function SignUpForm({ onSubmit }) {
  const connected = !!window.sb;
  const [form, setForm] = React.useState({ name: '', phone: '', email: '', pw: '', agree: false });
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [done, setDone] = React.useState(false);
  const [resetSent, setResetSent] = React.useState(false);
  const [dupState, setDupState] = React.useState(null); // null | 'duplicate' | 'rejected'
  const upd = (k, v) => setForm((p) => ({ ...p, [k]: v }));

  const doResetPassword = async () => {
    setBusy(true); setErr('');
    const { error } = await window.sb.auth.resetPasswordForEmail(form.email, {
      redirectTo: window.location.origin + window.location.pathname,
    });
    if (!error) {
      setResetSent(true);
      // BCC admin
      await notifyAdmin('ขอรีเซ็ตรหัสผ่าน', '(ผู้ใช้งาน)', form.email);
    } else {
      setErr('ไม่สามารถส่งอีเมลได้: ' + error.message);
    }
    setBusy(false);
  };

  const doSignup = async () => {
    if (!connected) { onSubmit(); return; }
    setBusy(true); setErr(''); setDupState(null);

    // Check for rejected profile with this email
    const { data: rejData } = await window.sb.from('profiles').select('id').eq('email', form.email).eq('role', 'rejected').maybeSingle();
    if (rejData) { setBusy(false); setDupState('rejected'); return; }

    // Check for existing non-rejected profile
    const { data: existData } = await window.sb.from('profiles').select('id').eq('email', form.email).neq('role', 'rejected').maybeSingle();
    if (existData) { setBusy(false); setDupState('duplicate'); return; }

    const { data, error } = await window.sb.auth.signUp({
      email: form.email,
      password: form.pw,
      options: { data: { full_name: form.name, phone: form.phone } },
    });
    if (error) {
      setBusy(false);
      const msg = error.message || '';
      if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already exists')) {
        setDupState('duplicate');
      } else {
        setErr(msg);
      }
      return;
    }
    // Supabase v2: returns fake-success for existing emails (identities=[])
    // to prevent email enumeration — detect and show duplicate screen
    if (!data.user || (data.user.identities && data.user.identities.length === 0)) {
      setBusy(false);
      setDupState('duplicate');
      return;
    }
    if (data.user) {
      await window.sb.from('profiles').insert({
        id: data.user.id, role: 'tenant', full_name: form.name,
        phone: form.phone, email: form.email,
      });
    }
    // Notify admin of new signup
    await notifyAdmin('สมัครสมาชิกใหม่ — รอการอนุมัติ', form.name, form.email);
    setBusy(false);
    setDone(true);
  };

  if (connected && done) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14, textAlign: 'center', padding: '20px 0' }}>
        <div style={{ fontSize: 22, fontWeight: 700 }}>สมัครสมาชิกสำเร็จ</div>
        <div className="tu-muted" style={{ fontSize: 13.5, lineHeight: 1.7 }}>
          กรุณายืนยันอีเมลของคุณ (ถ้าระบบกำหนดไว้) จากนั้นรอผู้ดูแลหอผูกบัญชีของคุณกับห้องพัก<br />
          คุณจะเข้าสู่ระบบได้ทันทีที่ผู้ดูแลดำเนินการเสร็จ
        </div>
      </div>
    );
  }

  if (resetSent) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14, padding: '12px 0' }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>ส่งอีเมลแล้ว</div>
        <div style={{ padding: 16, background: '#f0fdf4', borderRadius: 10, border: '1px solid #86efac', fontSize: 13.5, lineHeight: 1.8 }}>
          ระบบส่งลิงก์รีเซ็ตรหัสผ่านไปที่ <strong>{form.email}</strong>
        </div>
        <div style={{ fontSize: 13, lineHeight: 1.8, color: 'var(--muted)' }}>
          <div style={{ fontWeight: 600, color: 'var(--text)', marginBottom: 6 }}>ขั้นตอนต่อไป:</div>
          <div>1. เปิดกล่องขาเข้าของ <strong>{form.email}</strong></div>
          <div>2. ตรวจโฟลเดอร์ <strong>Spam / Junk</strong> ด้วยหากไม่เห็น</div>
          <div>3. กดลิงก์ "Reset Password" ในอีเมล</div>
          <div>4. ตั้งรหัสผ่านใหม่ แล้วจะกลับเข้าระบบได้ทันที</div>
        </div>
        <div style={{ padding: '10px 14px', background: '#fef9c3', borderRadius: 8, border: '1px solid #fde047', fontSize: 12 }}>
          อีเมลอาจใช้เวลา 1–3 นาที หากยังไม่ได้รับ กรุณาติดต่อ admin ของหอพัก
        </div>
        <Button variant="secondary" fullWidth onClick={() => { setResetSent(false); setDupState(null); }}>
          กลับหน้าเข้าสู่ระบบ
        </Button>
      </div>
    );
  }

  if (dupState === 'rejected') {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>ไม่สามารถลงทะเบียนได้</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 4 }}>อีเมล <strong>{form.email}</strong> ถูกปฏิเสธโดยผู้ดูแลระบบ</div>
        </div>
        <div style={{ padding: 14, background: '#fee2e2', borderRadius: 10, border: '1px solid #fca5a5', fontSize: 13, lineHeight: 1.6 }}>
          หากคุณเชื่อว่าเกิดข้อผิดพลาด กรุณาติดต่อผู้ดูแลหอพักโดยตรง
        </div>
        <Button fullWidth variant="secondary" onClick={() => { setDupState(null); setForm(f => ({ ...f, email: '' })); }}>
          ลองใช้อีเมลอื่น
        </Button>
      </div>
    );
  }

  if (dupState === 'duplicate') {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>อีเมลนี้มีในระบบแล้ว</div>
          <div className="tu-muted" style={{ fontSize: 13, marginTop: 4 }}>อีเมล <strong>{form.email}</strong> ถูกลงทะเบียนในระบบแล้ว</div>
        </div>
        <div style={{ padding: 14, background: '#fef9c3', borderRadius: 10, border: '1px solid #fde047', fontSize: 13, lineHeight: 1.6 }}>
          หากคุณลืมรหัสผ่าน กรุณากดปุ่ม "ลืมรหัสผ่าน" ระบบจะส่งลิงก์กลับเข้าสู่ระบบไปที่อีเมลของคุณเท่านั้น
        </div>
        {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
        <Button fullWidth onClick={doResetPassword} disabled={busy}>
          {busy ? 'กำลังส่งอีเมล…' : 'ลืมรหัสผ่าน — ส่งลิงก์กลับเข้าระบบ'}
        </Button>
        <Button fullWidth variant="secondary" onClick={() => { setDupState(null); setForm(f => ({ ...f, email: '' })); }}>
          ลงทะเบียนด้วยอีเมลอื่น
        </Button>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div>
        <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-.01em' }}>สมัครสมาชิกใหม่</div>
        <div className="tu-muted" style={{ fontSize: 13, marginTop: 4 }}>สมัครเพื่อใช้บริการจองห้องและจัดการบัญชีของคุณ</div>
      </div>
      <Input label="ชื่อ-นามสกุล" value={form.name} onChange={(v) => upd('name', v)} placeholder="คุณสมชาย ใจดี" />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <Input label="เบอร์โทร" value={form.phone} onChange={(v) => upd('phone', v)} placeholder="081-234-5678" />
        <Input label="อีเมล" value={form.email} onChange={(v) => upd('email', v)} placeholder="you@example.com" />
      </div>
      <Input label="รหัสผ่าน" type="password" value={form.pw} onChange={(v) => upd('pw', v)} hint="อย่างน้อย 8 ตัวอักษร" />
      <label style={{ display: 'flex', alignItems: 'flex-start', gap: 8, fontSize: 12.5, color: 'var(--muted)', cursor: 'pointer' }}>
        <input type="checkbox" checked={form.agree} onChange={(e) => upd('agree', e.target.checked)} style={{ marginTop: 3 }} />
        <span>ฉันยอมรับ <a className="tu-link" href="#">ข้อตกลงการใช้งาน</a> และ <a className="tu-link" href="#">นโยบายความเป็นส่วนตัว</a></span>
      </label>
      {err && <div style={{ fontSize: 12.5, color: '#dc2626' }}>{err}</div>}
      <Button fullWidth size="lg" onClick={doSignup} disabled={!form.agree || busy || (connected && (!form.name || !form.email || form.pw.length < 8))}>
        {busy ? 'กำลังสมัครสมาชิก…' : 'สมัครสมาชิก'}
      </Button>
    </div>
  );
}

// Lighten/darken a hex color by a -1..1 amount (negative = darker)
function shade(hex, amt) {
  const h = hex.replace('#', '');
  const num = parseInt(h.length === 3 ? h.replace(/./g, (c) => c + c) : h, 16);
  let r = num >> 16 & 255,g = num >> 8 & 255,b = num & 255;
  const adj = (c) => Math.max(0, Math.min(255, Math.round(c + (amt < 0 ? c * amt : (255 - c) * amt))));
  r = adj(r);g = adj(g);b = adj(b);
  return '#' + [r, g, b].map((c) => c.toString(16).padStart(2, '0')).join('');
}
